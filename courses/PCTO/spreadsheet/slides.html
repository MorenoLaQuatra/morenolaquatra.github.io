<header>Introduzione al Foglio di Calcolo</header>
<h2 id="il-foglio-di-calcolo">Il Foglio di Calcolo</h2>
<div class="definition">
<h3 id="definizione">Definizione</h3>
<p>Un <strong>foglio di calcolo</strong> è un programma che organizza i dati in una griglia di <strong>righe</strong> e <strong>colonne</strong>, permettendo di:</p>
<ul>
<li>Inserire e organizzare dati</li>
<li>Eseguire calcoli automatici</li>
<li>Creare grafici e visualizzazioni</li>
<li>Analizzare grandi quantità di informazioni</li>
</ul>
<p>NB: &quot;Foglio di calcolo&quot; <strong>non è</strong> sinonimo di &quot;Excel&quot;! Excel è solo uno dei tanti software di foglio di calcolo.</p>
</div>
<footer>Università degli Studi di Enna &quot;Kore&quot; | Moreno La Quatra</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="5" data-paginate="true" data-header="Introduzione al Foglio di Calcolo" data-footer="Università degli Studi di Enna &quot;Kore&quot; | Moreno La Quatra" data-theme="unikore-courses" lang="C" data-marpit-pagination="5" style="--paginate:true;--header:Introduzione al Foglio di Calcolo;--footer:Università degli Studi di Enna &quot;Kore&quot; | Moreno La Quatra;--theme:unikore-courses;" data-marpit-pagination-total="125">

<header>Introduzione al Foglio di Calcolo</header>
<h2 id="perch%C3%A9-usare-un-foglio-di-calcolo">Perché Usare un Foglio di Calcolo?</h2>
<div class="definition">
<p><strong>Automazione dei calcoli</strong>: scrivi una formula una volta, si aggiorna automaticamente</p>
<p><strong>Organizzazione dei dati</strong>: struttura chiara in righe e colonne</p>
<p><strong>Analisi rapida</strong>: funzioni statistiche, filtri, ordinamenti</p>
<p><strong>Visualizzazione</strong>: grafici e tabelle professionali</p>
<p><strong>Riduzione degli errori</strong>: calcoli automatici eliminano errori manuali</p>
</div>
<br />
<p><strong>Esempio</strong>: La media dei voti non è calcolata e scritta, <code>8.55</code>, ma calcolata automaticamente <code>=MEDIA(A1:A10)</code>.</p>
<footer>Università degli Studi di Enna &quot;Kore&quot; | Moreno La Quatra</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="9" data-paginate="true" data-header="Introduzione al Foglio di Calcolo" data-footer="Università degli Studi di Enna &quot;Kore&quot; | Moreno La Quatra" data-theme="unikore-courses" lang="C" data-marpit-pagination="9" style="--paginate:true;--header:Introduzione al Foglio di Calcolo;--footer:Università degli Studi di Enna &quot;Kore&quot; | Moreno La Quatra;--theme:unikore-courses;" data-marpit-pagination-total="125">
<header>Introduzione al Foglio di Calcolo</header>
<h2 id="casi-duso">Casi d'Uso</h2>
<div class="example">
<p><strong>Budget personale</strong>: tracciare entrate e uscite mensili</p>
<p><strong>Voti scolastici o universitari</strong>: calcolare medie ponderate</p>
<p><strong>Inventario</strong>: gestire liste di prodotti e quantità</p>
<p><strong>Analisi dati</strong>: elaborare risultati di sondaggi o esperimenti</p>
<p><strong>Pianificazione</strong>: creare calendari e cronogrammi</p>
</div>

<h2 id="linterfaccia-del-foglio-di-calcolo">L'Interfaccia del Foglio di Calcolo</h2>

</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="14" data-paginate="true" data-header="Introduzione al Foglio di Calcolo" data-footer="Università degli Studi di Enna &quot;Kore&quot; | Moreno La Quatra" data-theme="unikore-courses" lang="C" data-marpit-pagination="14" style="--paginate:true;--header:Introduzione al Foglio di Calcolo;--footer:Università degli Studi di Enna &quot;Kore&quot; | Moreno La Quatra;--theme:unikore-courses;" data-marpit-pagination-total="125">
<header>Introduzione al Foglio di Calcolo</header>
<h2 id="cos%C3%A8-una-cella">Cos'è una Cella?</h2>
<div class="definition">
<h3 id="definizione-1">Definizione</h3>
<p>Una <strong>cella</strong> è l'unità fondamentale del foglio di calcolo.</p>
<p>È l'intersezione tra una <strong>colonna</strong> (identificata da lettere: A, B, C...) e una <strong>riga</strong> (identificata da numeri: 1, 2, 3...).</p>
<p>Ogni cella ha un <strong>indirizzo unico</strong> formato dalla combinazione di lettera e numero.</p>
</div>
<footer>Università degli Studi di Enna &quot;Kore&quot; | Moreno La Quatra</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="15" data-paginate="true" data-header="Introduzione al Foglio di Calcolo" data-footer="Università degli Studi di Enna &quot;Kore&quot; | Moreno La Quatra" data-theme="unikore-courses" lang="C" data-marpit-pagination="15" style="--paginate:true;--header:Introduzione al Foglio di Calcolo;--footer:Università degli Studi di Enna &quot;Kore&quot; | Moreno La Quatra;--theme:unikore-courses;" data-marpit-pagination-total="125">
<header>Introduzione al Foglio di Calcolo</header>
<h2 id="indirizzo-di-una-cella">Indirizzo di una Cella</h2>
<div class="example">

<table>
<thead>
<tr>
<th>Cella</th>
<th>Colonna</th>
<th>Riga</th>
</tr>
</thead>
<tbody>
<tr>
<td><code>A1</code></td>
<td>A (prima)</td>
<td>1 (prima)</td>
</tr>
<tr>
<td><code>B5</code></td>
<td>B (seconda)</td>
<td>5 (quinta)</td>
</tr>
<tr>
<td><code>D12</code></td>
<td>D (quarta)</td>
<td>12 (dodicesima)</td>
</tr>
<tr>

<td>1 (prima)</td>
</tr>
</tbody>
</table>
</div>

<h2 id="selezionare-una-cella">Selezionare una Cella</h2>
<div class="definition">
<h3 id="metodi-di-selezione">Metodi di selezione</h3>
<p><strong>Clic singolo</strong>: seleziona una cella</p>
<p><strong>Clic e trascina</strong>: seleziona un intervallo di celle</p>
<p><strong>Ctrl + Clic</strong>: seleziona celle non adiacenti</p>
<p><strong>Shift + Clic</strong>: seleziona da cella attiva a cella cliccata</p>

<header>Introduzione al Foglio di Calcolo</header>
<h2 id="intervalli-di-celle">Intervalli di Celle</h2>

<td>Dalla cella A1 alla D1 (riga)</td>
</tr>
<tr>

Seleziona la cella e inizia a digitare (sostituisce tutto)</p>
<p><strong>Metodo 2 - Modifica</strong>:</p>
<ul>
<li>Doppio clic sulla cella, oppure</li>
<li>Seleziona e premi <code>F2</code>, oppure</li>
<li>Modifica dalla barra della formula</li>
</ul>

</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="33" data-paginate="true" data-header="Introduzione al Foglio di Calcolo" data-footer="Università degli Studi di Enna &quot;Kore&quot; | Moreno La Quatra" data-theme="unikore-courses" lang="C" data-marpit-pagination="33" style="--paginate:true;--header:Introduzione al Foglio di Calcolo;--footer:Università degli Studi di Enna &quot;Kore&quot; | Moreno La Quatra;--theme:unikore-courses;" data-marpit-pagination-total="125">
<header>Introduzione al Foglio di Calcolo</header>
<h2 id="numeri">Numeri</h2>
<div class="definition">
<p>I numeri sono allineati a <strong>destra</strong> per default.</p>
<p>Possono includere:</p>
<ul>
<li>Interi: <code>42</code>, <code>-15</code>, <code>0</code></li>
<li>Decimali: <code>3.14</code>, <code>2.5</code> (usa il punto o la virgola in base alle impostazioni)</li>
<li>Negativi: <code>-100</code></li>
<li>Notazione scientifica: <code>1.5E6</code> (= 1.500.000)</li>
</ul>
</div>
<footer>Università degli Studi di Enna &quot;Kore&quot; | Moreno La Quatra</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="34" data-paginate="true" data-header="Introduzione al Foglio di Calcolo" data-footer="Università degli Studi di Enna &quot;Kore&quot; | Moreno La Quatra" data-theme="unikore-courses" lang="C" data-marpit-pagination="34" style="--paginate:true;--header:Introduzione al Foglio di Calcolo;--footer:Università degli Studi di Enna &quot;Kore&quot; | Moreno La Quatra;--theme:unikore-courses;" data-marpit-pagination-total="125">
<header>Introduzione al Foglio di Calcolo</header>
<h2 id="testo">Testo</h2>
<div class="definition">
<p>Il testo è allineato a <strong>sinistra</strong> per default.</p>
<p>Include qualsiasi sequenza di caratteri non riconosciuta come numero, data o formula.</p>
<p><strong>Esempi</strong>: <code>Mario Rossi</code>, <code>Codice: ABC123</code>, <code>Nota importante</code></p>
</div>
<footer>Università degli Studi di Enna &quot;Kore&quot; | Moreno La Quatra</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="35" data-paginate="true" data-header="Introduzione al Foglio di Calcolo" data-footer="Università degli Studi di Enna &quot;Kore&quot; | Moreno La Quatra" data-theme="unikore-courses" lang="C" data-marpit-pagination="35" style="--paginate:true;--header:Introduzione al Foglio di Calcolo;--footer:Università degli Studi di Enna &quot;Kore&quot; | Moreno La Quatra;--theme:unikore-courses;" data-marpit-pagination-total="125">
<header>Introduzione al Foglio di Calcolo</header>
<h2 id="testo-che-sembra-un-numero">Testo che Sembra un Numero</h2>
<div class="important">
<h3 id="attenzione">Attenzione!</h3>
<p>Se vuoi inserire un numero come testo (es. codice <code>007</code>), inizia con un apostrofo:</p>
<p><code>'007</code> → verrà visualizzato come <code>007</code> (testo)</p>
<p>Senza apostrofo: <code>007</code> → diventa <code>7</code> (numero)</p>
<p>Questo è utile per: codici postali, numeri di telefono, codici prodotto.</p>
</div>
<footer>Università degli Studi di Enna &quot;Kore&quot; | Moreno La Quatra</footer>
</section>

<header>Introduzione al Foglio di Calcolo</header>
<h2 id="date-e-ore">Date e Ore</h2>
<div class="definition">
<h3 id="valori-temporali">Valori temporali</h3>
<p>Le date sono memorizzate come <strong>numeri</strong> internamente, ma visualizzate in formato leggibile.</p>
<p><strong>Formati comuni</strong>:</p>
<ul>
<li><code>01/12/2027</code> o <code>1-12-2027</code></li>
<li><code>14:30</code> o <code>2:30 PM</code></li>
<li><code>01/12/2027 14:30</code></li>
</ul>
<p>Questo permette di fare calcoli con le date!</p>
</div>
<footer>Università degli Studi di Enna &quot;Kore&quot; | Moreno La Quatra</footer>

<header>Introduzione al Foglio di Calcolo</header>
<h2 id="esempio-calcolo-con-date">Esempio: Calcolo con Date</h2>
<div class="example">
<h3 id="calcolare-giorni-tra-due-date">Calcolare giorni tra due date</h3>
<table>
<thead>
<tr>
<th></th>
<th>A</th>
<th>B</th>
</tr>
</thead>
<tbody>
<tr>
<td>1</td>
<td>Data inizio</td>
<td>01/01/2024</td>
</tr>
<tr>
<td>2</td>
<td>Data fine</td>
<td>15/03/2024</td>
</tr>
<tr>
<td>3</td>
<td>Giorni</td>
<td>=B2-B1</td>
</tr>
</tbody>
</table>
<p><strong>Risultato in B3</strong>: <code>74</code> (giorni di differenza)</p>
<p>NB: <code>=</code> indica che è una formula, ne parleremo più avanti!</p>
</div>
<footer>Università degli Studi di Enna &quot;Kore&quot; | Moreno La Quatra</footer>
</section>

<header>Introduzione al Foglio di Calcolo</header>
<h2 id="valori-booleani">Valori Booleani</h2>
<div class="note">
<h3 id="vero-e-falso">VERO e FALSO</h3>
<p>Le celle possono contenere valori logici:</p>
<ul>
<li><code>VERO</code> (o <code>TRUE</code>)</li>
<li><code>FALSO</code> (o <code>FALSE</code>)</li>
</ul>
<p>Sono il risultato di confronti e condizioni.</p>
<p>Esempio: <code>=A1&gt;10</code> restituisce <code>VERO</code> se A1 è maggiore di 10.</p>
</div>
<footer>Università degli Studi di Enna &quot;Kore&quot; | Moreno La Quatra</footer>

<header>Introduzione al Foglio di Calcolo</header>
<h2 id="perch%C3%A9-formattare">Perché Formattare?</h2>
<div class="definition">
<p>La formattazione serve a:</p>
<ul>
<li>Rendere i dati più <strong>leggibili</strong></li>
<li>Evidenziare informazioni <strong>importanti</strong></li>
<li>Dare un aspetto <strong>professionale</strong></li>
<li>Distinguere <strong>categorie</strong> di dati</li>
<li>Rappresentare correttamente <strong>numeri e valute</strong></li>
</ul>
</div>
<br />
<p>PS: Si accede alle opzioni di formattazione tramite il pulsante &quot;Formato&quot; nella barra degli strumenti.</p>
<footer>Università degli Studi di Enna &quot;Kore&quot; | Moreno La Quatra</footer>
</section>

<header>Introduzione al Foglio di Calcolo</header>
<h2 id="locale-e-impostazioni-regionali">Locale e Impostazioni Regionali</h2>
<div class="important">
<p>Il formato dei numeri e delle date dipende dalle impostazioni regionali del software. In Italia:</p>
<ul>
<li>Decimali: virgola <code>,</code></li>
<li>Migliaia: punto <code>.</code></li>
<li>Data: <code>GG/MM/AAAA</code> o <code>GG-MM-AAAA</code></li>
<li>...</li>
</ul>
<footer>Università degli Studi di Enna &quot;Kore&quot; | Moreno La Quatra</footer>
</section>

<header>Introduzione al Foglio di Calcolo</header>
<h2 id="bordi">Bordi</h2>
<div class="definition">
<h3 id="aggiungere-bordi-alle-celle">Aggiungere bordi alle celle</h3>
<p>I bordi aiutano a delimitare visivamente i dati.</p>
<p>Opzioni disponibili:</p>
<ul>
<li><strong>Stile linea</strong>: sottile, media, spessa, doppia, tratteggiata</li>
<li><strong>Colore</strong>: qualsiasi colore</li>
<li><strong>Posizione</strong>: superiore, inferiore, sinistra, destra, tutti</li>
</ul>

<header>Introduzione al Foglio di Calcolo</header>
<h2 id="sfondo-della-cella">Sfondo della Cella</h2>
<div class="example">
<h3 id="colore-di-riempimento">Colore di riempimento</h3>
<p>Usa il <strong>colore di sfondo</strong> per:</p>
<ul>
<li>Evidenziare intestazioni</li>
<li>Distinguere categorie</li>
<li>Segnalare valori particolari</li>
<li>Creare tabelle più leggibili</li>

</div>

<header>Introduzione al Foglio di Calcolo</header>
<h2 id="esempio-di-tabella-formattata">Esempio di Tabella Formattata</h2>
<div class="example">
<h3 id="prima-e-dopo-la-formattazione">Prima e dopo la formattazione</h3>
<p><strong>Prima</strong> (dati grezzi):</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>Nome    Voto    Data
Mario   28      15/1/2024
Anna    30      20/1/2024
</code></pre>
<p><strong>Dopo</strong> (formattata):</p>
<ul>
<li>Intestazioni in grassetto con sfondo colorato</li>
<li>Numeri allineati a destra</li>
<li>Date in formato esteso</li>
<li>Bordi per separare righe e colonne</li>
</ul>
</div>

<header>Introduzione al Foglio di Calcolo</header>

<footer>Università degli Studi di Enna &quot;Kore&quot; | Moreno La Quatra</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="59" data-paginate="true" data-header="Introduzione al Foglio di Calcolo" data-footer="Università degli Studi di Enna &quot;Kore&quot; | Moreno La Quatra" data-theme="unikore-courses" lang="C" data-marpit-pagination="59" style="--paginate:true;--header:Introduzione al Foglio di Calcolo;--footer:Università degli Studi di Enna &quot;Kore&quot; | Moreno La Quatra;--theme:unikore-courses;" data-marpit-pagination-total="125">
<header>Introduzione al Foglio di Calcolo</header>
<h2 id="struttura-della-barra">Struttura della Barra</h2>
<div class="definition">
<h3 id="componenti">Componenti</h3>
<p>La barra della formula si trova sopra l'area di lavoro e contiene:</p>
<ol>
<li><strong>Casella nome</strong> (sinistra): mostra l'indirizzo della cella attiva</li>
<li><strong>Pulsanti funzione</strong>: <code>fx</code> per inserire funzioni</li>
<li><strong>Area di input</strong>: mostra/permette di modificare il contenuto</li>
</ol>
</div>
<footer>Università degli Studi di Enna &quot;Kore&quot; | Moreno La Quatra</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="60" data-paginate="true" data-header="Introduzione al Foglio di Calcolo" data-footer="Università degli Studi di Enna &quot;Kore&quot; | Moreno La Quatra" data-theme="unikore-courses" lang="C" data-marpit-pagination="60" style="--paginate:true;--header:Introduzione al Foglio di Calcolo;--footer:Università degli Studi di Enna &quot;Kore&quot; | Moreno La Quatra;--theme:unikore-courses;" data-marpit-pagination-total="125">
<header>Introduzione al Foglio di Calcolo</header>
<h2 id="contenuto-vs-visualizzazione">Contenuto vs Visualizzazione</h2>
<div class="important">
<h3 id="differenza-fondamentale">Differenza fondamentale</h3>
<p><strong>Nella cella</strong> vedi il <strong>risultato</strong> (valore visualizzato)</p>
<p><strong>Nella barra</strong> vedi il <strong>contenuto reale</strong> (formula o dato)</p>
<p>Esempio:</p>
<ul>
<li>Cella mostra: <code>150</code></li>
<li>Barra mostra: <code>=A1+B1</code></li>
</ul>
</div>
<footer>Università degli Studi di Enna &quot;Kore&quot; | Moreno La Quatra</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="61" data-paginate="true" data-header="Introduzione al Foglio di Calcolo" data-footer="Università degli Studi di Enna &quot;Kore&quot; | Moreno La Quatra" data-theme="unikore-courses" lang="C" data-marpit-pagination="61" style="--paginate:true;--header:Introduzione al Foglio di Calcolo;--footer:Università degli Studi di Enna &quot;Kore&quot; | Moreno La Quatra;--theme:unikore-courses;" data-marpit-pagination-total="125">
<header>Introduzione al Foglio di Calcolo</header>
<h2 id="esempio-pratico">Esempio Pratico</h2>
<div class="example">
<h3 id="osservare-la-barra-della-formula">Osservare la barra della formula</h3>
<table>
<thead>
<tr>
<th></th>
<th>A</th>
<th>B</th>
<th>C</th>
</tr>
</thead>
<tbody>
<tr>
<td>1</td>
<td>100</td>
<td>50</td>
<td>150</td>
</tr>
</tbody>
</table>
<p>Se selezioni C1, la barra della formula potrebbe mostrare:</p>
<ul>
<li><code>150</code> → è un numero inserito manualmente</li>
<li><code>=A1+B1</code> → è una formula che somma A1 e B1</li>
</ul>
</div>
<footer>Università degli Studi di Enna &quot;Kore&quot; | Moreno La Quatra</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="62" data-paginate="true" data-header="Introduzione al Foglio di Calcolo" data-footer="Università degli Studi di Enna &quot;Kore&quot; | Moreno La Quatra" data-theme="unikore-courses" lang="C" data-marpit-pagination="62" style="--paginate:true;--header:Introduzione al Foglio di Calcolo;--footer:Università degli Studi di Enna &quot;Kore&quot; | Moreno La Quatra;--theme:unikore-courses;" data-marpit-pagination-total="125">
<header>Introduzione al Foglio di Calcolo</header>
<div class="image-container">
<p><img src="images/barra-funzioni.png" alt="" style="width:1000px;" /></p>
</div>
<footer>Università degli Studi di Enna &quot;Kore&quot; | Moreno La Quatra</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="63" data-paginate="true" data-header="Introduzione al Foglio di Calcolo" data-footer="Università degli Studi di Enna &quot;Kore&quot; | Moreno La Quatra" data-theme="unikore-courses" lang="C" data-marpit-pagination="63" style="--paginate:true;--header:Introduzione al Foglio di Calcolo;--footer:Università degli Studi di Enna &quot;Kore&quot; | Moreno La Quatra;--theme:unikore-courses;" data-marpit-pagination-total="125">
<header>Introduzione al Foglio di Calcolo</header>
<h2 id="modificare-dalla-barra">Modificare dalla Barra</h2>
<div class="note">
<p>Modificare dalla barra della formula è utile quando:</p>
<ul>
<li>La formula è lunga e complessa</li>
<li>Vuoi vedere l'intera formula senza entrare nella cella</li>
<li>Devi fare modifiche precise</li>
</ul>
<p>Clicca nella barra e usa le frecce per navigare nel testo.</p>
</div>
<footer>Università degli Studi di Enna &quot;Kore&quot; | Moreno La Quatra</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="64" data-paginate="true" data-header="Introduzione al Foglio di Calcolo" data-footer="Università degli Studi di Enna &quot;Kore&quot; | Moreno La Quatra" data-theme="unikore-courses" lang="C" data-marpit-pagination="64" style="--paginate:true;--header:Introduzione al Foglio di Calcolo;--footer:Università degli Studi di Enna &quot;Kore&quot; | Moreno La Quatra;--theme:unikore-courses;" data-marpit-pagination-total="125">
<header>Introduzione al Foglio di Calcolo</header>
<h2 id="espandere-la-barra">Espandere la Barra</h2>
<div class="example">
<p>Se la formula è molto lunga, puoi espandere la barra:</p>
<ol>
<li>Trascina il bordo inferiore della barra verso il basso</li>
<li>Oppure usa <code>Ctrl (or cmd) + Shift + U</code> per espandere/contrarre</li>
</ol>
<p>Questo è utile per formule complesse su più &quot;righe logiche&quot;.</p>
</div>
<footer>Università degli Studi di Enna &quot;Kore&quot; | Moreno La Quatra</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="65" data-paginate="true" data-header="Introduzione al Foglio di Calcolo" data-footer="Università degli Studi di Enna &quot;Kore&quot; | Moreno La Quatra" data-class="section" data-theme="unikore-courses" lang="C" class="section" data-marpit-pagination="65" style="--paginate:true;--header:Introduzione al Foglio di Calcolo;--footer:Università degli Studi di Enna &quot;Kore&quot; | Moreno La Quatra;--class:section;--theme:unikore-courses;" data-marpit-pagination-total="125">
<header>Introduzione al Foglio di Calcolo</header>

<h1 id="introduzione-alle-formule">Introduzione alle Formule</h1>
<footer>Università degli Studi di Enna &quot;Kore&quot; | Moreno La Quatra</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="66" data-paginate="true" data-header="Introduzione al Foglio di Calcolo" data-footer="Università degli Studi di Enna &quot;Kore&quot; | Moreno La Quatra" data-theme="unikore-courses" lang="C" data-marpit-pagination="66" style="--paginate:true;--header:Introduzione al Foglio di Calcolo;--footer:Università degli Studi di Enna &quot;Kore&quot; | Moreno La Quatra;--theme:unikore-courses;" data-marpit-pagination-total="125">
<header>Introduzione al Foglio di Calcolo</header>
<h2 id="cos%C3%A8-una-formula">Cos'è una Formula?</h2>
<div class="definition">
<h3 id="definizione-2">Definizione</h3>
<p>Una <strong>formula</strong> è un'espressione che inizia con il segno <code>=</code> e calcola un risultato.</p>
<p>Può contenere:</p>
<ul>
<li>Numeri: <code>=5+3</code></li>
<li>Riferimenti a celle: <code>=A1+B1</code></li>
<li>Operatori: <code>+</code>, <code>-</code>, <code>*</code>, <code>/</code></li>
<li>Funzioni: <code>=SOMMA(A1:A10)</code></li>
</ul>
</div>
<footer>Università degli Studi di Enna &quot;Kore&quot; | Moreno La Quatra</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="67" data-paginate="true" data-header="Introduzione al Foglio di Calcolo" data-footer="Università degli Studi di Enna &quot;Kore&quot; | Moreno La Quatra" data-theme="unikore-courses" lang="C" data-marpit-pagination="67" style="--paginate:true;--header:Introduzione al Foglio di Calcolo;--footer:Università degli Studi di Enna &quot;Kore&quot; | Moreno La Quatra;--theme:unikore-courses;" data-marpit-pagination-total="125">
<header>Introduzione al Foglio di Calcolo</header>
<h2 id="il-segno-uguale">Il Segno Uguale</h2>
<div class="important">
<p>Ogni formula <strong>DEVE</strong> iniziare con il segno <code>=</code></p>
<p><strong>Corretto</strong>: <code>=A1+A2</code> → calcola la somma</p>
<p><strong>Errato</strong>: <code>A1+A2</code> → viene interpretato come testo!</p>
</div>
<footer>Università degli Studi di Enna &quot;Kore&quot; | Moreno La Quatra</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="68" data-paginate="true" data-header="Introduzione al Foglio di Calcolo" data-footer="Università degli Studi di Enna &quot;Kore&quot; | Moreno La Quatra" data-theme="unikore-courses" lang="C" data-marpit-pagination="68" style="--paginate:true;--header:Introduzione al Foglio di Calcolo;--footer:Università degli Studi di Enna &quot;Kore&quot; | Moreno La Quatra;--theme:unikore-courses;" data-marpit-pagination-total="125">
<header>Introduzione al Foglio di Calcolo</header>
<div class="image-container">
<p><img src="images/formula-uguale.png" alt="" style="width:1000px;" /></p>
</div>
<footer>Università degli Studi di Enna &quot;Kore&quot; | Moreno La Quatra</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="69" data-paginate="true" data-header="Introduzione al Foglio di Calcolo" data-footer="Università degli Studi di Enna &quot;Kore&quot; | Moreno La Quatra" data-theme="unikore-courses" lang="C" data-marpit-pagination="69" style="--paginate:true;--header:Introduzione al Foglio di Calcolo;--footer:Università degli Studi di Enna &quot;Kore&quot; | Moreno La Quatra;--theme:unikore-courses;" data-marpit-pagination-total="125">
<header>Introduzione al Foglio di Calcolo</header>
<h2 id="operatori-matematici">Operatori Matematici</h2>
<div class="definition">
<h3 id="operatori-di-base">Operatori di base</h3>
<table>
<thead>
<tr>
<th>Operatore</th>
<th>Operazione</th>
<th>Esempio</th>
<th>Risultato</th>
</tr>
</thead>
<tbody>
<tr>
<td><code>+</code></td>
<td>Addizione</td>
<td><code>=5+3</code></td>
<td>8</td>
</tr>
<tr>
<td><code>-</code></td>
<td>Sottrazione</td>
<td><code>=10-4</code></td>
<td>6</td>
</tr>
<tr>
<td><code>*</code></td>
<td>Moltiplicazione</td>
<td><code>=6*7</code></td>
<td>42</td>
</tr>
<tr>
<td><code>/</code></td>
<td>Divisione</td>
<td><code>=20/4</code></td>
<td>5</td>
</tr>
</tbody>
</table>
</div>
<footer>Università degli Studi di Enna &quot;Kore&quot; | Moreno La Quatra</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="70" data-paginate="true" data-header="Introduzione al Foglio di Calcolo" data-footer="Università degli Studi di Enna &quot;Kore&quot; | Moreno La Quatra" data-theme="unikore-courses" lang="C" data-marpit-pagination="70" style="--paginate:true;--header:Introduzione al Foglio di Calcolo;--footer:Università degli Studi di Enna &quot;Kore&quot; | Moreno La Quatra;--theme:unikore-courses;" data-marpit-pagination-total="125">
<header>Introduzione al Foglio di Calcolo</header>
<h2 id="altri-operatori">Altri Operatori</h2>
<div class="definition">
<h3 id="operatori-aggiuntivi">Operatori aggiuntivi</h3>
<table>
<thead>
<tr>
<th>Operatore</th>
<th>Operazione</th>
<th>Esempio</th>
<th>Risultato</th>
</tr>
</thead>
<tbody>
<tr>
<td><code>^</code></td>
<td>Potenza</td>
<td><code>=2^3</code></td>
<td>8</td>
</tr>
<tr>
<td><code>%</code></td>
<td>Percentuale</td>
<td><code>=50%</code></td>
<td>0,5</td>
</tr>
<tr>
<td><code>&amp;</code></td>
<td>Concatenazione testo</td>
<td><code>=&quot;Ciao &quot;&amp;&quot;Mondo&quot;</code></td>
<td>Ciao Mondo</td>
</tr>
</tbody>
</table>
</div>
<footer>Università degli Studi di Enna &quot;Kore&quot; | Moreno La Quatra</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="71" data-paginate="true" data-header="Introduzione al Foglio di Calcolo" data-footer="Università degli Studi di Enna &quot;Kore&quot; | Moreno La Quatra" data-theme="unikore-courses" lang="C" data-marpit-pagination="71" style="--paginate:true;--header:Introduzione al Foglio di Calcolo;--footer:Università degli Studi di Enna &quot;Kore&quot; | Moreno La Quatra;--theme:unikore-courses;" data-marpit-pagination-total="125">
<header>Introduzione al Foglio di Calcolo</header>
<h2 id="ordine-delle-operazioni">Ordine delle Operazioni</h2>
<div class="important">
<h3 id="precedenza-degli-operatori">Precedenza degli operatori</h3>
<p>Le operazioni seguono l'ordine matematico standard:</p>
<ol>
<li><strong>Parentesi</strong> <code>()</code></li>
<li><strong>Potenza</strong> <code>^</code></li>
<li><strong>Moltiplicazione e Divisione</strong> <code>*</code> <code>/</code></li>
<li><strong>Addizione e Sottrazione</strong> <code>+</code> <code>-</code></li>
</ol>
<p>Da sinistra a destra per operatori di pari livello.</p>
</div>
<footer>Università degli Studi di Enna &quot;Kore&quot; | Moreno La Quatra</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="72" data-paginate="true" data-header="Introduzione al Foglio di Calcolo" data-footer="Università degli Studi di Enna &quot;Kore&quot; | Moreno La Quatra" data-theme="unikore-courses" lang="C" data-marpit-pagination="72" style="--paginate:true;--header:Introduzione al Foglio di Calcolo;--footer:Università degli Studi di Enna &quot;Kore&quot; | Moreno La Quatra;--theme:unikore-courses;" data-marpit-pagination-total="125">
<header>Introduzione al Foglio di Calcolo</header>
<h2 id="esempio-di-precedenza">Esempio di Precedenza</h2>
<div class="example">
<h3 id="calcolo-passo-passo">Calcolo passo-passo</h3>
<p><code>=10+5*2</code> → Quanto fa?</p>
<ol>
<li>Prima la moltiplicazione: <code>5*2 = 10</code></li>
<li>Poi l'addizione: <code>10+10 = 20</code></li>
</ol>
<p><strong>Risultato</strong>: <code>20</code></p>
<p>Se vuoi prima la somma: <code>=(10+5)*2 = 30</code></p>
</div>
<footer>Università degli Studi di Enna &quot;Kore&quot; | Moreno La Quatra</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="73" data-paginate="true" data-header="Introduzione al Foglio di Calcolo" data-footer="Università degli Studi di Enna &quot;Kore&quot; | Moreno La Quatra" data-theme="unikore-courses" lang="C" data-marpit-pagination="73" style="--paginate:true;--header:Introduzione al Foglio di Calcolo;--footer:Università degli Studi di Enna &quot;Kore&quot; | Moreno La Quatra;--theme:unikore-courses;" data-marpit-pagination-total="125">
<header>Introduzione al Foglio di Calcolo</header>
<h2 id="scrivere-una-formula-semplice">Scrivere una Formula Semplice</h2>
<div class="example">
<h3 id="procedura-passo-passo">Procedura passo-passo</h3>
<ol>
<li>Seleziona la cella dove vuoi il risultato</li>
<li>Digita <code>=</code></li>
<li>Scrivi l'espressione (es. <code>A1+B1</code>)</li>
<li>Premi <code>Invio</code></li>
</ol>
<p>La cella mostra il risultato, la barra mostra la formula.</p>
</div>
<footer>Università degli Studi di Enna &quot;Kore&quot; | Moreno La Quatra</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="74" data-paginate="true" data-header="Introduzione al Foglio di Calcolo" data-footer="Università degli Studi di Enna &quot;Kore&quot; | Moreno La Quatra" data-theme="unikore-courses" lang="C" data-marpit-pagination="74" style="--paginate:true;--header:Introduzione al Foglio di Calcolo;--footer:Università degli Studi di Enna &quot;Kore&quot; | Moreno La Quatra;--theme:unikore-courses;" data-marpit-pagination-total="125">
<header>Introduzione al Foglio di Calcolo</header>
<h2 id="usare-riferimenti-a-celle">Usare Riferimenti a Celle</h2>
<div class="definition">
<h3 id="perch%C3%A9-usare-riferimenti">Perché usare riferimenti?</h3>
<p>Invece di scrivere <code>=100+50</code>, scrivi <code>=A1+B1</code></p>
<p><strong>Vantaggi</strong>:</p>
<ul>
<li>Se cambi il valore in A1 o B1, il risultato si aggiorna automaticamente</li>
<li>Puoi copiare la formula in altre celle</li>
<li>Il foglio diventa dinamico e riutilizzabile</li>
</ul>
</div>
<footer>Università degli Studi di Enna &quot;Kore&quot; | Moreno La Quatra</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="75" data-paginate="true" data-header="Introduzione al Foglio di Calcolo" data-footer="Università degli Studi di Enna &quot;Kore&quot; | Moreno La Quatra" data-theme="unikore-courses" lang="C" data-marpit-pagination="75" style="--paginate:true;--header:Introduzione al Foglio di Calcolo;--footer:Università degli Studi di Enna &quot;Kore&quot; | Moreno La Quatra;--theme:unikore-courses;" data-marpit-pagination-total="125">
<header>Introduzione al Foglio di Calcolo</header>
<h2 id="esempio-calcolo-totale">Esempio: Calcolo Totale</h2>
<div class="example">
<h3 id="spesa-mensile">Spesa mensile</h3>
<table>
<thead>
<tr>
<th></th>
<th>A</th>
<th>B</th>
</tr>
</thead>
<tbody>
<tr>
<td>1</td>
<td>Affitto</td>
<td>500</td>
</tr>
<tr>
<td>2</td>
<td>Bollette</td>
<td>150</td>
</tr>
<tr>
<td>3</td>
<td>Spesa</td>
<td>300</td>
</tr>
<tr>
<td>4</td>
<td><strong>Totale</strong></td>
<td><code>=B1+B2+B3</code></td>
</tr>
</tbody>
</table>
<p>Il risultato in B4 sarà <code>950</code>. Se modifichi B2, il totale si aggiorna!</p>
</div>
<footer>Università degli Studi di Enna &quot;Kore&quot; | Moreno La Quatra</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="76" data-paginate="true" data-header="Introduzione al Foglio di Calcolo" data-footer="Università degli Studi di Enna &quot;Kore&quot; | Moreno La Quatra" data-theme="unikore-courses" lang="C" data-marpit-pagination="76" style="--paginate:true;--header:Introduzione al Foglio di Calcolo;--footer:Università degli Studi di Enna &quot;Kore&quot; | Moreno La Quatra;--theme:unikore-courses;" data-marpit-pagination-total="125">
<header>Introduzione al Foglio di Calcolo</header>
<h2 id="selezionare-celle-con-il-mouse">Selezionare Celle con il Mouse</h2>
<div class="note">
<h3 id="metodo-alternativo">Metodo alternativo</h3>
<p>Invece di digitare gli indirizzi, puoi cliccare sulle celle:</p>
<ol>
<li>Digita <code>=</code></li>
<li>Clicca sulla prima cella (appare l'indirizzo)</li>
<li>Digita l'operatore (<code>+</code>, <code>-</code>, etc.)</li>
<li>Clicca sulla seconda cella</li>
<li>Premi <code>Invio</code></li>
</ol>
<p>Utile per evitare errori di digitazione!</p>
</div>
<footer>Università degli Studi di Enna &quot;Kore&quot; | Moreno La Quatra</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="77" data-paginate="true" data-header="Introduzione al Foglio di Calcolo" data-footer="Università degli Studi di Enna &quot;Kore&quot; | Moreno La Quatra" data-theme="unikore-courses" lang="C" data-marpit-pagination="77" style="--paginate:true;--header:Introduzione al Foglio di Calcolo;--footer:Università degli Studi di Enna &quot;Kore&quot; | Moreno La Quatra;--theme:unikore-courses;" data-marpit-pagination-total="125">
<header>Introduzione al Foglio di Calcolo</header>
<h2 id="operatori-di-confronto">Operatori di Confronto</h2>
<div class="definition">
<h3 id="per-creare-condizioni">Per creare condizioni</h3>
<table>
<thead>
<tr>
<th>Operatore</th>
<th>Significato</th>
<th>Esempio</th>
<th>Risultato</th>
</tr>
</thead>
<tbody>
<tr>
<td><code>=</code></td>
<td>Uguale</td>
<td><code>=A1=10</code></td>
<td>VERO/FALSO</td>
</tr>
<tr>
<td><code>&lt;&gt;</code></td>
<td>Diverso</td>
<td><code>=A1&lt;&gt;10</code></td>
<td>VERO/FALSO</td>
</tr>
<tr>
<td><code>&gt;</code></td>
<td>Maggiore</td>
<td><code>=A1&gt;10</code></td>
<td>VERO/FALSO</td>
</tr>
<tr>
<td><code>&lt;</code></td>
<td>Minore</td>
<td><code>=A1&lt;10</code></td>
<td>VERO/FALSO</td>
</tr>
<tr>
<td><code>&gt;=</code></td>
<td>Maggiore o uguale</td>
<td><code>=A1&gt;=10</code></td>
<td>VERO/FALSO</td>
</tr>
<tr>
<td><code>&lt;=</code></td>
<td>Minore o uguale</td>
<td><code>=A1&lt;=10</code></td>
<td>VERO/FALSO</td>
</tr>
</tbody>
</table>
</div>
<footer>Università degli Studi di Enna &quot;Kore&quot; | Moreno La Quatra</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="78" data-paginate="true" data-header="Introduzione al Foglio di Calcolo" data-footer="Università degli Studi di Enna &quot;Kore&quot; | Moreno La Quatra" data-class="section" data-theme="unikore-courses" lang="C" class="section" data-marpit-pagination="78" style="--paginate:true;--header:Introduzione al Foglio di Calcolo;--footer:Università degli Studi di Enna &quot;Kore&quot; | Moreno La Quatra;--class:section;--theme:unikore-courses;" data-marpit-pagination-total="125">
<header>Introduzione al Foglio di Calcolo</header>

<h1 id="riferimenti-relativi-e-assoluti">Riferimenti Relativi e Assoluti</h1>
<footer>Università degli Studi di Enna &quot;Kore&quot; | Moreno La Quatra</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="79" data-paginate="true" data-header="Introduzione al Foglio di Calcolo" data-footer="Università degli Studi di Enna &quot;Kore&quot; | Moreno La Quatra" data-theme="unikore-courses" lang="C" data-marpit-pagination="79" style="--paginate:true;--header:Introduzione al Foglio di Calcolo;--footer:Università degli Studi di Enna &quot;Kore&quot; | Moreno La Quatra;--theme:unikore-courses;" data-marpit-pagination-total="125">
<header>Introduzione al Foglio di Calcolo</header>
<h2 id="il-concetto-di-riferimento">Il Concetto di Riferimento</h2>
<div class="definition">
<p>Un <strong>riferimento</strong> è l'indirizzo di una cella usato in una formula.</p>
<p>Esistono due tipi principali:</p>
<ul>
<li><strong>Relativo</strong>: <code>A1</code> - si adatta quando copi la formula</li>
<li><strong>Assoluto</strong>: <code>$A$1</code> - resta fisso quando copi la formula</li>
</ul>
</div>
<footer>Università degli Studi di Enna &quot;Kore&quot; | Moreno La Quatra</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="80" data-paginate="true" data-header="Introduzione al Foglio di Calcolo" data-footer="Università degli Studi di Enna &quot;Kore&quot; | Moreno La Quatra" data-theme="unikore-courses" lang="C" data-marpit-pagination="80" style="--paginate:true;--header:Introduzione al Foglio di Calcolo;--footer:Università degli Studi di Enna &quot;Kore&quot; | Moreno La Quatra;--theme:unikore-courses;" data-marpit-pagination-total="125">
<header>Introduzione al Foglio di Calcolo</header>
<h2 id="riferimento-relativo">Riferimento Relativo</h2>
<div class="definition">
<p>Un riferimento relativo (es. <code>A1</code>) indica una posizione <strong>relativa</strong> alla cella contenente la formula.</p>
<p>Quando copi la formula, il riferimento si <strong>adatta</strong> automaticamente alla nuova posizione.</p>
</div>
<footer>Università degli Studi di Enna &quot;Kore&quot; | Moreno La Quatra</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="81" data-paginate="true" data-header="Introduzione al Foglio di Calcolo" data-footer="Università degli Studi di Enna &quot;Kore&quot; | Moreno La Quatra" data-theme="unikore-courses" lang="C" data-marpit-pagination="81" style="--paginate:true;--header:Introduzione al Foglio di Calcolo;--footer:Università degli Studi di Enna &quot;Kore&quot; | Moreno La Quatra;--theme:unikore-courses;" data-marpit-pagination-total="125">
<header>Introduzione al Foglio di Calcolo</header>
<div class="image-container">
<p><img src="images/riferimenti-excel.png" alt="" style="width:800px;" /></p>
</div>
<footer>Università degli Studi di Enna &quot;Kore&quot; | Moreno La Quatra</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="82" data-paginate="true" data-header="Introduzione al Foglio di Calcolo" data-footer="Università degli Studi di Enna &quot;Kore&quot; | Moreno La Quatra" data-theme="unikore-courses" lang="C" data-marpit-pagination="82" style="--paginate:true;--header:Introduzione al Foglio di Calcolo;--footer:Università degli Studi di Enna &quot;Kore&quot; | Moreno La Quatra;--theme:unikore-courses;" data-marpit-pagination-total="125">
<header>Introduzione al Foglio di Calcolo</header>
<h2 id="esempio-riferimento-relativo">Esempio: Riferimento Relativo</h2>
<div class="example">
<h3 id="copia-di-una-formula">Copia di una formula</h3>
<table>
<thead>
<tr>
<th></th>
<th>A</th>
<th>B</th>
<th>C</th>
</tr>
</thead>
<tbody>
<tr>
<td>1</td>
<td>10</td>
<td>20</td>
<td><code>=A1+B1</code> → 30</td>
</tr>
<tr>
<td>2</td>
<td>15</td>
<td>25</td>
<td></td>
</tr>
</tbody>
</table>
<p>Se copi C1 in C2, la formula diventa <code>=A2+B2</code> → 40</p>
<p>Il riferimento si è &quot;spostato&quot; di una riga in basso!</p>
</div>
<footer>Università degli Studi di Enna &quot;Kore&quot; | Moreno La Quatra</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="83" data-paginate="true" data-header="Introduzione al Foglio di Calcolo" data-footer="Università degli Studi di Enna &quot;Kore&quot; | Moreno La Quatra" data-theme="unikore-courses" lang="C" data-marpit-pagination="83" style="--paginate:true;--header:Introduzione al Foglio di Calcolo;--footer:Università degli Studi di Enna &quot;Kore&quot; | Moreno La Quatra;--theme:unikore-courses;" data-marpit-pagination-total="125">
<header>Introduzione al Foglio di Calcolo</header>
<h2 id="visualizzare-lo-spostamento">Visualizzare lo Spostamento</h2>
<div class="example">
<h3 id="come-funziona">Come funziona</h3>
<p>Formula in C1: <code>=A1+B1</code></p>
<ul>
<li>A1 è &quot;2 colonne a sinistra, stessa riga&quot;</li>
<li>B1 è &quot;1 colonna a sinistra, stessa riga&quot;</li>
</ul>
<p>Copiata in C2:</p>
<ul>
<li>&quot;2 colonne a sinistra, stessa riga&quot; → A2</li>
<li>&quot;1 colonna a sinistra, stessa riga&quot; → B2</li>
</ul>
<p>Risultato: <code>=A2+B2</code></p>
</div>
<footer>Università degli Studi di Enna &quot;Kore&quot; | Moreno La Quatra</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="84" data-paginate="true" data-header="Introduzione al Foglio di Calcolo" data-footer="Università degli Studi di Enna &quot;Kore&quot; | Moreno La Quatra" data-theme="unikore-courses" lang="C" data-marpit-pagination="84" style="--paginate:true;--header:Introduzione al Foglio di Calcolo;--footer:Università degli Studi di Enna &quot;Kore&quot; | Moreno La Quatra;--theme:unikore-courses;" data-marpit-pagination-total="125">
<header>Introduzione al Foglio di Calcolo</header>
<h2 id="riferimento-assoluto">Riferimento Assoluto</h2>
<div class="definition">
<h3 id="comportamento">Comportamento</h3>
<p>Un riferimento assoluto (es. <code>$A$1</code>) indica una posizione <strong>fissa</strong> nel foglio.</p>
<p>Il simbolo <code>$</code> &quot;blocca&quot; la parte che precede:</p>
<ul>
<li><code>$A$1</code> → colonna E riga fisse</li>
<li>Quando copi la formula, questo riferimento NON cambia</li>
</ul>
</div>
<footer>Università degli Studi di Enna &quot;Kore&quot; | Moreno La Quatra</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="85" data-paginate="true" data-header="Introduzione al Foglio di Calcolo" data-footer="Università degli Studi di Enna &quot;Kore&quot; | Moreno La Quatra" data-theme="unikore-courses" lang="C" data-marpit-pagination="85" style="--paginate:true;--header:Introduzione al Foglio di Calcolo;--footer:Università degli Studi di Enna &quot;Kore&quot; | Moreno La Quatra;--theme:unikore-courses;" data-marpit-pagination-total="125">
<header>Introduzione al Foglio di Calcolo</header>
<h2 id="esempio-riferimento-assoluto">Esempio: Riferimento Assoluto</h2>
<div class="example">
<h3 id="calcolo-con-valore-fisso">Calcolo con valore fisso</h3>
<table>
<thead>
<tr>
<th></th>
<th>A</th>
<th>B</th>
</tr>
</thead>
<tbody>
<tr>
<td>1</td>
<td><strong>IVA</strong></td>
<td>22%</td>
</tr>
<tr>
<td>2</td>
<td>Prezzo</td>
<td>IVA</td>
</tr>
<tr>
<td>3</td>
<td>100</td>
<td><code>=A3*$B$1</code></td>
</tr>
<tr>
<td>4</td>
<td>200</td>
<td><code>=A4*$B$1</code></td>
</tr>
</tbody>
</table>
<p>Copiando la formula, <code>$B$1</code> resta sempre <code>$B$1</code>, mentre <code>A3</code> diventa <code>A4</code>.</p>
</div>
<footer>Università degli Studi di Enna &quot;Kore&quot; | Moreno La Quatra</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="86" data-paginate="true" data-header="Introduzione al Foglio di Calcolo" data-footer="Università degli Studi di Enna &quot;Kore&quot; | Moreno La Quatra" data-theme="unikore-courses" lang="C" data-marpit-pagination="86" style="--paginate:true;--header:Introduzione al Foglio di Calcolo;--footer:Università degli Studi di Enna &quot;Kore&quot; | Moreno La Quatra;--theme:unikore-courses;" data-marpit-pagination-total="125">
<header>Introduzione al Foglio di Calcolo</header>
<h2 id="creare-un-riferimento-assoluto">Creare un Riferimento Assoluto</h2>
<div class="important">
<h3 id="come-inserire-il">Come inserire il $</h3>
<p><strong>Metodo 1</strong>: Digita manualmente i simboli <code>$</code></p>
<p><strong>Metodo 2</strong>: Seleziona il riferimento nella formula e premi <code>F4</code></p>
<p>Ogni pressione di <code>F4</code> cicla tra:<br />
<code>A1</code> → <code>$A$1</code> → <code>A$1</code> → <code>$A1</code> → <code>A1</code> ...</p>
</div>
<footer>Università degli Studi di Enna &quot;Kore&quot; | Moreno La Quatra</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="87" data-paginate="true" data-header="Introduzione al Foglio di Calcolo" data-footer="Università degli Studi di Enna &quot;Kore&quot; | Moreno La Quatra" data-theme="unikore-courses" lang="C" data-marpit-pagination="87" style="--paginate:true;--header:Introduzione al Foglio di Calcolo;--footer:Università degli Studi di Enna &quot;Kore&quot; | Moreno La Quatra;--theme:unikore-courses;" data-marpit-pagination-total="125">
<header>Introduzione al Foglio di Calcolo</header>
<h2 id="riferimenti-misti">Riferimenti Misti</h2>
<div class="definition">
<h3 id="bloccare-solo-riga-o-colonna">Bloccare solo riga o colonna</h3>
<table>
<thead>
<tr>
<th>Riferimento</th>
<th>Colonna</th>
<th>Riga</th>
<th>Comportamento</th>
</tr>
</thead>
<tbody>
<tr>
<td><code>A1</code></td>
<td>Relativa</td>
<td>Relativa</td>
<td>Entrambe cambiano</td>
</tr>
<tr>
<td><code>$A$1</code></td>
<td>Assoluta</td>

<div class="resources">

<p><strong>Relativo</strong> (<code>A1</code>): quando vuoi che il riferimento si adatti (caso più comune)</p>

<li>

</li>
<li>
<p><strong>Misto</strong> (<code>$A1</code> o <code>A$1</code>): quando vuoi bloccare solo una dimensione (tabelle a doppia entrata)</p>
</li>
</ol>
</div>

<header>Introduzione al Foglio di Calcolo</header>
<h2 id="il-quadratino-di-riempimento">Il &quot;Quadratino&quot; di Riempimento</h2>
<div class="definition">
<h3 id="cos%C3%A8">Cos'è?</h3>
<p>Il <strong>&quot;quadratino&quot; di riempimento</strong> è il piccolo quadrato nell'angolo in basso a destra della cella selezionata.</p>
<p>Trascinandolo puoi:</p>
<ul>
<li>Copiare contenuto</li>
<li>Estendere serie (numeri, date, giorni...)</li>
<li>Copiare formule (adattando i riferimenti)</li>
</ul>
</div>
<footer>Università degli Studi di Enna &quot;Kore&quot; | Moreno La Quatra</footer>

</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="101" data-paginate="true" data-header="Introduzione al Foglio di Calcolo" data-footer="Università degli Studi di Enna &quot;Kore&quot; | Moreno La Quatra" data-theme="unikore-courses" lang="C" data-marpit-pagination="101" style="--paginate:true;--header:Introduzione al Foglio di Calcolo;--footer:Università degli Studi di Enna &quot;Kore&quot; | Moreno La Quatra;--theme:unikore-courses;" data-marpit-pagination-total="125">
<header>Introduzione al Foglio di Calcolo</header>
<h2 id="cos%C3%A8-una-funzione">Cos'è una Funzione?</h2>
<div class="definition">
<h3 id="definizione-3">Definizione</h3>
<p>Una <strong>funzione</strong> è una formula predefinita che esegue un calcolo specifico.</p>
<p>Struttura: <code>=NOME_FUNZIONE(argomenti)</code></p>
<ul>
<li><strong>Nome</strong>: identifica la funzione (es. SOMMA, MEDIA)</li>
<li><strong>Argomenti</strong>: i dati su cui opera (tra parentesi, separati da <code>;</code>)</li>
</ul>
</div>
<footer>Università degli Studi di Enna &quot;Kore&quot; | Moreno La Quatra</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="102" data-paginate="true" data-header="Introduzione al Foglio di Calcolo" data-footer="Università degli Studi di Enna &quot;Kore&quot; | Moreno La Quatra" data-theme="unikore-courses" lang="C" data-marpit-pagination="102" style="--paginate:true;--header:Introduzione al Foglio di Calcolo;--footer:Università degli Studi di Enna &quot;Kore&quot; | Moreno La Quatra;--theme:unikore-courses;" data-marpit-pagination-total="125">

<h2 id="funzione-somma">Funzione SOMMA</h2>

<h3 id="sintassi">Sintassi</h3>
<p><code>=SOMMA(numero1; numero2; ...)</code></p>
<p>oppure</p>
<p><code>=SOMMA(intervallo)</code></p>
<p>Calcola la <strong>somma</strong> di tutti i valori indicati.</p>
</div>
<footer>Università degli Studi di Enna &quot;Kore&quot; | Moreno La Quatra</footer>
</section>
