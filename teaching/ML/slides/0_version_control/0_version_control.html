<header>Machine Learning - Version Control</header>
<h2 id="the-problem-why-do-we-need-version-control">The Problem: Why Do We Need Version Control?</h2>
<div class="important">
<h3 id="a-familiar-scenario">A Familiar Scenario</h3>
<p>Imagine you are working on your ML project. You have a model that works, and you want to try a new architecture. You modify the code, but the new version performs worse. Now you want to go back to the previous version, but you have already overwritten the file.</p>
<p>Or consider this: you and a teammate are both editing <code>train.py</code> at the same time. You email files back and forth, and end up with <code>train_v2_final_FINAL_really_final.py</code>. Sound familiar?</p>
<p>These problems - losing previous working versions, struggling to collaborate, and not knowing who changed what and when - are exactly what <strong>version control</strong> solves.</p>
</div>
<footer>Moreno La Quatra | Kore University of Enna</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="3" data-paginate="true" data-header="Machine Learning - Version Control" data-footer="Moreno La Quatra | Kore University of Enna" data-theme="unikore-courses" lang="C" data-marpit-pagination="3" style="--paginate:true;--header:Machine Learning - Version Control;--footer:Moreno La Quatra | Kore University of Enna;--theme:unikore-courses;" data-marpit-pagination-total="57">
<header>Machine Learning - Version Control</header>
<h2 id="what-is-version-control">What is Version Control?</h2>
<div class="definition">
<p><strong>Version control</strong> is a system that records every change made to a file or set of files over time. Think of it as an &quot;infinite undo&quot; button combined with a detailed logbook: at any point, you can see exactly what changed, who changed it, when it was changed, and why.</p>
<p>More specifically, version control allows you to:</p>
<ul>
<li><strong>Track</strong> every modification to every file in your project</li>
<li><strong>Revert</strong> to any previous state if something breaks</li>
<li><strong>Branch</strong> off to experiment without risking your working code</li>
<li><strong>Merge</strong> experimental changes back into the main project once they work</li>
<li><strong>Collaborate</strong> with others on the same codebase without stepping on each other's toes</li>
</ul>
<p>For ML projects in particular, version control is the foundation of <strong>reproducibility</strong>.</p>
</div>
<footer>Moreno La Quatra | Kore University of Enna</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="4" data-paginate="true" data-header="Machine Learning - Version Control" data-footer="Moreno La Quatra | Kore University of Enna" data-theme="unikore-courses" lang="C" data-marpit-pagination="4" style="--paginate:true;--header:Machine Learning - Version Control;--footer:Moreno La Quatra | Kore University of Enna;--theme:unikore-courses;" data-marpit-pagination-total="57">

<p><img src="images/how-git-works.png" alt="" style="width:700px;" /></p>

<footer>Moreno La Quatra | Kore University of Enna</footer>

</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="5" data-paginate="true" data-header="Machine Learning - Version Control" data-footer="Moreno La Quatra | Kore University of Enna" data-theme="unikore-courses" lang="C" data-marpit-pagination="5" style="--paginate:true;--header:Machine Learning - Version Control;--footer:Moreno La Quatra | Kore University of Enna;--theme:unikore-courses;" data-marpit-pagination-total="57">
<header>Machine Learning - Version Control</header>
<h2 id="why-version-control-matters-for-ml">Why Version Control Matters for ML</h2>
<div class="important">
<p>ML projects introduce unique challenges that make version control even more critical:</p>
<ul>
<li><strong>Experiments are iterative</strong>: You will train different model variants. Without version control, you lose track of which code produced which results.</li>
<li><strong>Code and data evolve together</strong>: A model's performance depends on both the code <em>and</em> the data it was trained on. You need to track both.</li>
<li><strong>Collaboration is essential</strong>: Real-world ML projects involve data scientists, engineers, and researchers working in parallel.</li>
<li><strong>Reproducibility is non-negotiable</strong>: If you cannot reproduce your results, your work loses credibility. Version control makes it possible to recreate any previous experiment.</li>
</ul>
</div>
<footer>Moreno La Quatra | Kore University of Enna</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="6" data-paginate="true" data-header="Machine Learning - Version Control" data-footer="Moreno La Quatra | Kore University of Enna" data-theme="unikore-courses" lang="C" data-marpit-pagination="6" style="--paginate:true;--header:Machine Learning - Version Control;--footer:Moreno La Quatra | Kore University of Enna;--theme:unikore-courses;" data-marpit-pagination-total="57">
<header>Machine Learning - Version Control</header>
<h2 id="git">Git</h2>
<div class="definition">
<p><strong>Git</strong> is a <strong>distributed version control system</strong> created by <a href="https://en.wikipedia.org/wiki/Linus_Torvalds">Linus Torvalds</a> in 2005 (the same person who created Linux). It is by far the most widely used version control system in the world, and it is the tool you will use throughout this course and your career.</p>
<p>What makes Git &quot;distributed&quot; is that every developer has a <strong>complete copy</strong> of the entire project history on their own machine. This means you can work offline, commit changes locally, and synch with others when you are ready.</p>
</div>
<div style="display: flex; justify-content: center;">
  <img src="https://git-scm.com/images/logos/downloads/Git-Logo-2Color.png" width="200" />
</div>
<footer>Moreno La Quatra | Kore University of Enna</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="7" data-paginate="true" data-header="Machine Learning - Version Control" data-footer="Moreno La Quatra | Kore University of Enna" data-theme="unikore-courses" lang="C" data-marpit-pagination="7" style="--paginate:true;--header:Machine Learning - Version Control;--footer:Moreno La Quatra | Kore University of Enna;--theme:unikore-courses;" data-marpit-pagination-total="57">
<header>Machine Learning - Version Control</header>
<h2 id="gits-mental-model">Git's Mental Model</h2>
<div class="definition">
<p>Before learning any Git commands, let's understand the mental model. Git organizes your work into <strong>three areas</strong>:</p>
<ol>
<li>
<p><strong>Working Directory</strong> - This is simply the folder on your computer where your files live. When you edit <code>train.py</code> in your text editor, you are modifying the working directory.<br />
<u><strong>Git is watching, but has not recorded anything yet.</strong></u></p>
</li>
<li>
<p><strong>Staging Area</strong> (also called &quot;Index&quot;) - This is a preparation zone. When you are happy with certain changes, you move them here to say &quot;I want these specific changes to be part of my next snapshot.&quot;.<br />
<u><strong>Think of it as putting items into a box before shipping.</strong></u></p>
</li>
<li>
<p><strong>Repository</strong> (the <code>.git</code> folder) - This is Git's permanent memory. When you &quot;commit,&quot; Git takes everything in the staging area and saves it as a permanent snapshot in the repository.<br />
<u><strong>Once committed, that snapshot is safely stored forever.</strong></u></p>
</li>
</ol>
<p>The workflow is always: <strong>Edit</strong> (working directory) -&gt; <strong>Stage</strong> (staging area) -&gt; <strong>Commit</strong> (repository).</p>
</div>
<footer>Moreno La Quatra | Kore University of Enna</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="8" data-paginate="true" data-header="Machine Learning - Version Control" data-footer="Moreno La Quatra | Kore University of Enna" data-theme="unikore-courses" lang="C" data-marpit-pagination="8" style="--paginate:true;--header:Machine Learning - Version Control;--footer:Moreno La Quatra | Kore University of Enna;--theme:unikore-courses;" data-marpit-pagination-total="57">
<header>Machine Learning - Version Control</header>
<h2 id="installing-git">Installing Git</h2>
<div class="example">
<p>Before using Git, you need to install it on your machine. Here is how to do it depending on your operating system:</p>
<p><strong>On macOS</strong> (using Homebrew):</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash">brew install git
</code></pre>
<p><strong>On Ubuntu/Debian Linux</strong>:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash"><span class="hljs-built_in">sudo</span> apt-get install git
</code></pre>
<p>That's it!</p>
</div>
<footer>Moreno La Quatra | Kore University of Enna</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="9" data-paginate="true" data-header="Machine Learning - Version Control" data-footer="Moreno La Quatra | Kore University of Enna" data-theme="unikore-courses" lang="C" data-marpit-pagination="9" style="--paginate:true;--header:Machine Learning - Version Control;--footer:Moreno La Quatra | Kore University of Enna;--theme:unikore-courses;" data-marpit-pagination-total="57">
<header>Machine Learning - Version Control</header>
<h2 id="installing-git-1">Installing Git</h2>
<div class="example">
<p><strong>On Windows</strong>: (Yeah it is also available for Windows.)<br />
Download the installer from <a href="https://git-scm.com/">git-scm.com</a> and follow the setup wizard.</p>
<p>After installation, verify it works by running:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash">git --version
</code></pre>
<p>You should also set your identity, which Git attaches to every commit you make:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash">git config --global user.name <span class="hljs-string">&quot;Your Name&quot;</span>
git config --global user.email <span class="hljs-string">&quot;your.email@example.com&quot;</span>
</code></pre>
</div>
<footer>Moreno La Quatra | Kore University of Enna</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="10" data-paginate="true" data-header="Machine Learning - Version Control" data-footer="Moreno La Quatra | Kore University of Enna" data-theme="unikore-courses" lang="C" data-marpit-pagination="10" style="--paginate:true;--header:Machine Learning - Version Control;--footer:Moreno La Quatra | Kore University of Enna;--theme:unikore-courses;" data-marpit-pagination-total="57">
<header>Machine Learning - Version Control</header>
<h2 id="step-1-initializing-a-repository">Step 1: Initializing a Repository</h2>
<div class="definition">
<p>The first step in any Git project is to <strong>initialize a repository</strong>. This tells Git &quot;start tracking this folder.&quot;<br />
You do this once, at the beginning of a new project.</p>
</div>
<div class="example">
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash"><span class="hljs-comment"># Create a new folder for your ML project</span>
<span class="hljs-built_in">mkdir</span> best-ml-project

<span class="hljs-comment"># Move into that folder</span>
<span class="hljs-built_in">cd</span> best-ml-project

<span class="hljs-comment"># Initialize Git - this creates a hidden .git folder that stores all version history</span>
git init
</code></pre>
<p>After running <code>git init</code>, Git creates a hidden <code>.git</code> directory inside your project folder. This directory contains all the metadata and history that Git needs. You should never manually edit anything inside <code>.git</code>.</p>
</div>
<footer>Moreno La Quatra | Kore University of Enna</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="11" data-paginate="true" data-header="Machine Learning - Version Control" data-footer="Moreno La Quatra | Kore University of Enna" data-theme="unikore-courses" lang="C" data-marpit-pagination="11" style="--paginate:true;--header:Machine Learning - Version Control;--footer:Moreno La Quatra | Kore University of Enna;--theme:unikore-courses;" data-marpit-pagination-total="57">
<header>Machine Learning - Version Control</header>
<h2 id="step-2-adding-files-to-the-staging-area">Step 2: Adding Files to the Staging Area</h2>
<div class="definition">
<p>When you create or modify files, Git notices the changes but does not automatically record them. You need to explicitly tell Git which changes you want to include in your next snapshot.<br />
This is called <strong>staging</strong>, and you do it with <code>git add</code>.</p>
<p>Why does this intermediate step exist? Because it gives you <strong>fine-grained control</strong>. Imagine you changed three files, but only two changes are related to the same feature. You can stage just those two files and commit them together, keeping your history clean and useful for tracking.</p>
</div>
<footer>Moreno La Quatra | Kore University of Enna</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="12" data-paginate="true" data-header="Machine Learning - Version Control" data-footer="Moreno La Quatra | Kore University of Enna" data-theme="unikore-courses" lang="C" data-marpit-pagination="12" style="--paginate:true;--header:Machine Learning - Version Control;--footer:Moreno La Quatra | Kore University of Enna;--theme:unikore-courses;" data-marpit-pagination-total="57">
<header>Machine Learning - Version Control</header>
<div class="example">
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash"><span class="hljs-comment"># Create a README file for your project</span>
<span class="hljs-built_in">echo</span> <span class="hljs-string">&quot;This is the beginning of the best ML project&quot;</span> &gt; README.md

<span class="hljs-comment"># Stage the file - tell Git &quot;I want this change in my next commit&quot;</span>
git add README.md
</code></pre>
<p>You can also stage all modified files at once with <code>git add .</code> or <code>git add -A</code> (the dot means &quot;everything in the current directory&quot;). However, be careful with this - you might accidentally stage files you do not want to commit.</p>
</div>
<footer>Moreno La Quatra | Kore University of Enna</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="13" data-paginate="true" data-header="Machine Learning - Version Control" data-footer="Moreno La Quatra | Kore University of Enna" data-theme="unikore-courses" lang="C" data-marpit-pagination="13" style="--paginate:true;--header:Machine Learning - Version Control;--footer:Moreno La Quatra | Kore University of Enna;--theme:unikore-courses;" data-marpit-pagination-total="57">
<header>Machine Learning - Version Control</header>
<h2 id="step-3-committing-changes">Step 3: Committing Changes</h2>
<div class="definition">
<p>A <strong>commit</strong> is a permanent snapshot of your project at a specific point in time. Think of it as taking a photograph: once the photo is taken, it captures exactly what was there at that moment, and it cannot be changed.</p>
<p>Every commit has:</p>
<ul>
<li>A <strong>unique identifier</strong> (a long hexadecimal string called a SHA hash, e.g., <code>a3f4b2c</code>)</li>
<li>The <strong>author</strong> (your name and email, from your config)</li>
<li>A <strong>timestamp</strong> (when the commit was made)</li>
<li>A <strong>message</strong> (your description of what changed and why)</li>
<li>A <strong>pointer to the previous commit</strong> (creating a chain of history)</li>
</ul>
</div>
<footer>Moreno La Quatra | Kore University of Enna</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="14" data-paginate="true" data-header="Machine Learning - Version Control" data-footer="Moreno La Quatra | Kore University of Enna" data-theme="unikore-courses" lang="C" data-marpit-pagination="14" style="--paginate:true;--header:Machine Learning - Version Control;--footer:Moreno La Quatra | Kore University of Enna;--theme:unikore-courses;" data-marpit-pagination-total="57">
<header>Machine Learning - Version Control</header>
<div class="example">
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash"><span class="hljs-comment"># Commit the staged changes with a descriptive message</span>
git commit -m <span class="hljs-string">&quot;Initialize repository with README&quot;</span>
</code></pre>
<p>Write meaningful commit messages! A good commit message explains <strong>what</strong> changed and <strong>why</strong>. Avoid vague messages like &quot;updated stuff&quot; or &quot;fix.&quot; Prefer messages like &quot;Add data preprocessing pipeline for image augmentation.&quot;</p>
</div>
<footer>Moreno La Quatra | Kore University of Enna</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="15" data-paginate="true" data-header="Machine Learning - Version Control" data-footer="Moreno La Quatra | Kore University of Enna" data-theme="unikore-courses" lang="C" data-marpit-pagination="15" style="--paginate:true;--header:Machine Learning - Version Control;--footer:Moreno La Quatra | Kore University of Enna;--theme:unikore-courses;" data-marpit-pagination-total="57">
<header>Machine Learning - Version Control</header>
<h2 id="checking-the-status-of-your-repository">Checking the Status of Your Repository</h2>
<div class="definition">
<p>At any point, you can ask Git &quot;what is going on right now?&quot; using <code>git status</code>. This command shows you which files have been modified, which are staged, and which are untracked (new files that Git has never seen before).</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash"><span class="hljs-comment"># See what has changed in your working directory</span>
git status
</code></pre>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sh">On branch main
Changes not staged <span class="hljs-keyword">for</span> commit:
  modified:   train.py

Untracked files:
  data_loader.py
</code></pre>
<p><code>train.py</code> has been modified but not yet staged, and <code>data_loader.py</code> is a new file (not yet tracking).</p>
</div>
<footer>Moreno La Quatra | Kore University of Enna</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="16" data-paginate="true" data-header="Machine Learning - Version Control" data-footer="Moreno La Quatra | Kore University of Enna" data-theme="unikore-courses" lang="C" data-marpit-pagination="16" style="--paginate:true;--header:Machine Learning - Version Control;--footer:Moreno La Quatra | Kore University of Enna;--theme:unikore-courses;" data-marpit-pagination-total="57">
<header>Machine Learning - Version Control</header>
<h2 id="viewing-commit-history">Viewing Commit History</h2>
<div class="definition">
<p>The <strong>commit log</strong> is your project's complete history. Every commit ever made is recorded here, forming a timeline that you can browse, search, and navigate. This is one of the most powerful features of Git - you can always look back and understand how your project evolved.</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash"><span class="hljs-comment"># View the full commit history</span>
git <span class="hljs-built_in">log</span>

<span class="hljs-comment"># View a condensed, one-line-per-commit history</span>
git <span class="hljs-built_in">log</span> --oneline

<span class="hljs-comment"># View history with a visual graph of branches</span>
git <span class="hljs-built_in">log</span> --oneline --graph --all
</code></pre>
<p>Each entry in the log shows the commit hash, author, date, and message. The <code>--oneline</code> flag is particularly useful for getting a quick overview. The <code>--graph</code> flag draws a visual representation of branches and merges.</p>
</div>
<footer>Moreno La Quatra | Kore University of Enna</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="17" data-paginate="true" data-header="Machine Learning - Version Control" data-footer="Moreno La Quatra | Kore University of Enna" data-theme="unikore-courses" lang="C" data-marpit-pagination="17" style="--paginate:true;--header:Machine Learning - Version Control;--footer:Moreno La Quatra | Kore University of Enna;--theme:unikore-courses;" data-marpit-pagination-total="57">
<header>Machine Learning - Version Control</header>
<h2 id="other-useful-git-commands">Other Useful Git Commands</h2>
<div class="example">
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash"><span class="hljs-comment"># Show exactly what changed in each file (line-by-line differences)</span>
git diff

<span class="hljs-comment"># Undo changes to a file in the working directory (discard edits)</span>
git checkout -- &lt;file&gt;

<span class="hljs-comment"># Undo the last commit but keep changes in working directory</span>
git reset --soft HEAD~1

<span class="hljs-comment"># Temporarily save uncommitted changes so you can switch tasks</span>
git stash

<span class="hljs-comment"># Bring back stashed changes</span>
git stash pop

<span class="hljs-comment"># Undo a specific commit by creating a new &quot;reversal&quot; commit</span>
git revert &lt;commit-hash&gt;
</code></pre>
</div>
<footer>Moreno La Quatra | Kore University of Enna</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="18" data-paginate="true" data-header="Machine Learning - Version Control" data-footer="Moreno La Quatra | Kore University of Enna" data-theme="unikore-courses" lang="C" data-marpit-pagination="18" style="--paginate:true;--header:Machine Learning - Version Control;--footer:Moreno La Quatra | Kore University of Enna;--theme:unikore-courses;" data-marpit-pagination-total="57">
<header>Machine Learning - Version Control</header>
<h2 id="branching-working-on-features-in-isolation">Branching: Working on Features in Isolation</h2>
<div class="definition">
<p><strong>Branches</strong> are one of Git's most powerful features. A branch is essentially a separate line of development. When you create a branch, you get a complete copy of your project where you can make changes without affecting the main codebase.</p>
<p>Here is a concrete example:</p>
<ol>
<li>Your model is working well on the <code>main</code> branch. You want to try replacing the optimizer with a new one, but you are not sure it will improve things.</li>
<li>Instead of modifying <code>main</code> directly (and risking breaking your working code), you create a new branch called <code>try-new-optimizer</code>. You experiment freely on that branch.</li>
<li>If it works, you merge it back into <code>main</code>. If it does not, you simply delete the branch - and <code>main</code> was never affected.</li>
</ol>
<p>The default branch is usually called <strong><code>main</code></strong> (or <code>master</code> in older repositories).</p>
</div>
<footer>Moreno La Quatra | Kore University of Enna</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="19" data-paginate="true" data-header="Machine Learning - Version Control" data-footer="Moreno La Quatra | Kore University of Enna" data-theme="unikore-courses" lang="C" data-marpit-pagination="19" style="--paginate:true;--header:Machine Learning - Version Control;--footer:Moreno La Quatra | Kore University of Enna;--theme:unikore-courses;" data-marpit-pagination-total="57">
<header>Machine Learning - Version Control</header>
<h2 id="branching-in-practice">Branching in Practice</h2>
<div class="example">
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash"><span class="hljs-comment"># Create a new branch called &quot;new-feature&quot;</span>
git branch new-feature

<span class="hljs-comment"># Switch to that branch (your working directory now reflects this branch)</span>
git checkout new-feature

<span class="hljs-comment"># Shortcut: create AND switch to a new branch in one command</span>
git checkout -b new-feature
</code></pre>
<p>Once you are on the <code>new-feature</code> branch, any commits you make only exist on that branch. The <code>main</code> branch stays exactly as it was. You can switch back to <code>main</code> at any time with <code>git checkout main</code>.</p>
</div>
<footer>Moreno La Quatra | Kore University of Enna</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="20" data-paginate="true" data-header="Machine Learning - Version Control" data-footer="Moreno La Quatra | Kore University of Enna" data-theme="unikore-courses" lang="C" data-marpit-pagination="20" style="--paginate:true;--header:Machine Learning - Version Control;--footer:Moreno La Quatra | Kore University of Enna;--theme:unikore-courses;" data-marpit-pagination-total="57">
<header>Machine Learning - Version Control</header>
<div class="image-container">
<img src="images/git-branch.webp" width="600" />
</div>
<footer>Moreno La Quatra | Kore University of Enna</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="21" data-paginate="true" data-header="Machine Learning - Version Control" data-footer="Moreno La Quatra | Kore University of Enna" data-theme="unikore-courses" lang="C" data-marpit-pagination="21" style="--paginate:true;--header:Machine Learning - Version Control;--footer:Moreno La Quatra | Kore University of Enna;--theme:unikore-courses;" data-marpit-pagination-total="57">
<header>Machine Learning - Version Control</header>
<h2 id="merging">Merging</h2>
<div class="definition">
<p>Once you are happy with the work on a branch, you <strong>merge</strong> it back into the main branch. Merging takes the changes from one branch and integrates them into another.</p>
<p>In most cases, Git can merge automatically. However, if the same lines of the same file were modified on both branches, Git does not know which version to keep, and you get a <strong>merge conflict</strong>. <u>Do not panic</u> - this is normal! Git will mark the conflicting lines, and you simply choose which version to keep (or combine both).</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash"><span class="hljs-comment"># First, switch to the branch you want to merge INTO (usually main)</span>
git checkout main

<span class="hljs-comment"># Merge the feature branch into main</span>
git merge new-feature
</code></pre>
<p>After merging, it is a good practice to delete the feature branch to keep things clean:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash">git branch -d new-feature
</code></pre>
</div>
<footer>Moreno La Quatra | Kore University of Enna</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="22" data-paginate="true" data-header="Machine Learning - Version Control" data-footer="Moreno La Quatra | Kore University of Enna" data-theme="unikore-courses" lang="C" data-marpit-pagination="22" style="--paginate:true;--header:Machine Learning - Version Control;--footer:Moreno La Quatra | Kore University of Enna;--theme:unikore-courses;" data-marpit-pagination-total="57">
<header>Machine Learning - Version Control</header>
<h2 id="handling-merge-conflicts">Handling Merge Conflicts</h2>
<div class="definition">
<p>A <strong>merge conflict</strong> occurs when Git cannot automatically reconcile changes from two branches because the same part of a file was modified differently on each branch. This is one of the things that can feel intimidating at first, but once you understand what is happening, it is straightforward to resolve.</p>
<p>When a conflict occurs, Git inserts special markers into the file to show you both versions:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python">&lt;&lt;&lt;&lt;&lt;&lt;&lt; HEAD
learning_rate = <span class="hljs-number">0.001</span>
=======
learning_rate = <span class="hljs-number">0.0005</span>
&gt;&gt;&gt;&gt;&gt;&gt;&gt; new-feature
</code></pre>
<p>Everything between <code>&lt;&lt;&lt;&lt;&lt;&lt;&lt; HEAD</code> and <code>=======</code> is the version on your current branch (e.g., <code>main</code>). Everything between <code>=======</code> and <code>&gt;&gt;&gt;&gt;&gt;&gt;&gt; new-feature</code> is the incoming version.</p>
</div>
<footer>Moreno La Quatra | Kore University of Enna</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="23" data-paginate="true" data-header="Machine Learning - Version Control" data-footer="Moreno La Quatra | Kore University of Enna" data-theme="unikore-courses" lang="C" data-marpit-pagination="23" style="--paginate:true;--header:Machine Learning - Version Control;--footer:Moreno La Quatra | Kore University of Enna;--theme:unikore-courses;" data-marpit-pagination-total="57">
<header>Machine Learning - Version Control</header>
<h2 id="git-and-github">Git and GitHub</h2>
<div class="important">
<center style="color:red; font-size: 60px;">
<p><strong>Git is NOT GitHub</strong></p>
</center>
<p>This is a very common source of confusion, so let's be crystal clear:</p>
<ul>
<li><strong>Git</strong> is a <strong>tool</strong> that runs on your local machine. It manages version history, branches, and commits. You can use Git entirely offline, without any internet connection.</li>
<li><strong>GitHub</strong> is a <strong>web platform</strong> (now owned by Microsoft) that hosts Git repositories in the cloud. It adds collaboration features like pull requests, issue tracking, project boards, and more.</li>
</ul>
</div>
<footer>Moreno La Quatra | Kore University of Enna</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="24" data-paginate="true" data-header="Machine Learning - Version Control" data-footer="Moreno La Quatra | Kore University of Enna" data-theme="unikore-courses" lang="C" data-marpit-pagination="24" style="--paginate:true;--header:Machine Learning - Version Control;--footer:Moreno La Quatra | Kore University of Enna;--theme:unikore-courses;" data-marpit-pagination-total="57">
<header>Machine Learning - Version Control</header>
<h2 id="git-vs-github-visual-comparison">Git vs GitHub: Visual Comparison</h2>
<div class="grid-2">
<div class="definition">
<h3 id="git-the-tool">Git (The Tool)</h3>
<ul>
<li>Runs <strong>locally</strong> on your machine</li>
<li>Manages version history</li>
<li>Handles branching and merging</li>
<li>Works entirely <strong>offline</strong></li>
<li>Installed via command line</li>
<li>Free and open-source</li>
</ul>
</div>
<div class="definition">
<h3 id="github-the-platform">GitHub (The Platform)</h3>
<ul>
<li>Runs <strong>in the cloud</strong> (github.com)</li>
<li>Hosts remote repositories</li>
<li>Adds collaboration features (PRs, Issues)</li>
<li>Requires <strong>internet</strong> connection</li>
<li>Accessed via web browser or CLI</li>
<li>Free for public repos, paid for advanced features</li>
</ul>
</div>
</div>
<p>Other platforms similar to GitHub include <strong>GitLab</strong> and <strong>Bitbucket</strong>. The concepts you learn here apply to all of them.</p>
<footer>Moreno La Quatra | Kore University of Enna</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="25" data-paginate="true" data-header="Machine Learning - Version Control" data-footer="Moreno La Quatra | Kore University of Enna" data-theme="unikore-courses" lang="C" data-marpit-pagination="25" style="--paginate:true;--header:Machine Learning - Version Control;--footer:Moreno La Quatra | Kore University of Enna;--theme:unikore-courses;" data-marpit-pagination-total="57">
<header>Machine Learning - Version Control</header>
<h2 id="connecting-git-to-github">Connecting Git to GitHub</h2>
<div class="definition">
<p>To share your local repository with others (or simply to have a backup in the cloud), you connect it to a <strong>remote repository</strong> on GitHub. The word &quot;remote&quot; simply means &quot;not on your local machine.&quot; By convention, the main remote is called <strong><code>origin</code></strong>.</p>
</div>
<div class="example">
<ol>
<li>Create a new repository on GitHub (via the web interface)</li>
<li>Copy the repository URL (e.g., <code>https://github.com/yourusername/best-ml-project.git</code>)</li>
<li>Link your local repo to the remote:</li>
</ol>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash"><span class="hljs-comment"># Add a remote called &quot;origin&quot; pointing to your GitHub repo</span>
git remote add origin https://github.com/yourusername/best-ml-project.git

<span class="hljs-comment"># Push your local commits to GitHub</span>
git push -u origin main
</code></pre>
<p>The <code>-u</code> flag sets <code>origin main</code> as the default upstream, so future pushes only need <code>git push</code>.</p>
</div>
<footer>Moreno La Quatra | Kore University of Enna</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="26" data-paginate="true" data-header="Machine Learning - Version Control" data-footer="Moreno La Quatra | Kore University of Enna" data-theme="unikore-courses" lang="C" data-marpit-pagination="26" style="--paginate:true;--header:Machine Learning - Version Control;--footer:Moreno La Quatra | Kore University of Enna;--theme:unikore-courses;" data-marpit-pagination-total="57">
<header>Machine Learning - Version Control</header>
<h2 id="cloning-and-pulling">Cloning and Pulling</h2>
<div class="definition">
<p>There are two other essential operations for working with remote repositories:</p>
<ul>
<li><strong>Cloning</strong> means downloading an entire remote repository to your local machine. This is how you get someone else's project (or your own project on a new computer).</li>
<li><strong>Pulling</strong> means downloading the latest changes from the remote repository and merging them into your local copy. This is how you stay up-to-date with changes others have pushed.</li>
</ul>
</div>
<div class="example">
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash"><span class="hljs-comment"># Clone a repository from GitHub to your local machine</span>
git <span class="hljs-built_in">clone</span> https://github.com/someuser/some-project.git

<span class="hljs-comment"># Pull the latest changes from the remote (run this from inside the repo)</span>
git pull origin main
</code></pre>
<p>A good habit: <strong>always pull before you push.</strong> This ensures you have the latest changes.</p>
</div>
<footer>Moreno La Quatra | Kore University of Enna</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="27" data-paginate="true" data-header="Machine Learning - Version Control" data-footer="Moreno La Quatra | Kore University of Enna" data-theme="unikore-courses" lang="C" data-marpit-pagination="27" style="--paginate:true;--header:Machine Learning - Version Control;--footer:Moreno La Quatra | Kore University of Enna;--theme:unikore-courses;" data-marpit-pagination-total="57">
<header>Machine Learning - Version Control</header>
<h2 id="github-repositories">GitHub Repositories</h2>
<div class="definition">
<p>A <strong>repository</strong> (often shortened to &quot;repo&quot;) on GitHub is the online home of your project. It stores all your files, the entire commit history, branches, and any metadata (issues, pull requests, etc.).</p>
<p>Repositories can be:</p>
<ul>
<li><strong>Public</strong> - Anyone on the internet can see the code (but only authorized people can modify it). This is common for open-source projects.</li>
<li><strong>Private</strong> - Only people you explicitly invite can see or modify the code. This is common for coursework and proprietary projects.</li>
</ul>
</div>
<footer>Moreno La Quatra | Kore University of Enna</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="28" data-paginate="true" data-header="Machine Learning - Version Control" data-footer="Moreno La Quatra | Kore University of Enna" data-theme="unikore-courses" lang="C" data-marpit-pagination="28" style="--paginate:true;--header:Machine Learning - Version Control;--footer:Moreno La Quatra | Kore University of Enna;--theme:unikore-courses;" data-marpit-pagination-total="57">
<header>Machine Learning - Version Control</header>
<div class="image-container">
<p><img src="images/github-repo.png" alt="" style="width:800px;" /></p>
</div>
<footer>Moreno La Quatra | Kore University of Enna</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="29" data-paginate="true" data-header="Machine Learning - Version Control" data-footer="Moreno La Quatra | Kore University of Enna" data-theme="unikore-courses" lang="C" data-marpit-pagination="29" style="--paginate:true;--header:Machine Learning - Version Control;--footer:Moreno La Quatra | Kore University of Enna;--theme:unikore-courses;" data-marpit-pagination-total="57">
<header>Machine Learning - Version Control</header>
<h2 id="github-issues">GitHub Issues</h2>
<div class="definition">
<p><strong>Issues</strong> are GitHub's built-in task and bug tracking system. Think of them as a structured <strong>to-do list for your project</strong>. Each issue has a title, a description, labels (like &quot;bug,&quot; &quot;enhancement,&quot; &quot;question&quot;), and can be assigned to specific people.</p>
<p>In ML projects, issues are useful for tracking things like:</p>
<ul>
<li>&quot;Implement data augmentation for training pipeline&quot;</li>
<li>&quot;Bug: model crashes when batch size is 1&quot;</li>
<li>&quot;Experiment: try learning rate scheduling&quot;</li>
</ul>
<p>Issues can also be linked to specific commits or pull requests, creating a clear trail from &quot;we identified this problem&quot; to &quot;here is the code that fixes it.&quot;</p>
</div>
<footer>Moreno La Quatra | Kore University of Enna</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="30" data-paginate="true" data-header="Machine Learning - Version Control" data-footer="Moreno La Quatra | Kore University of Enna" data-theme="unikore-courses" lang="C" data-marpit-pagination="30" style="--paginate:true;--header:Machine Learning - Version Control;--footer:Moreno La Quatra | Kore University of Enna;--theme:unikore-courses;" data-marpit-pagination-total="57">
<header>Machine Learning - Version Control</header>
<div class="image-container">
<p><img src="images/github-issues.png" alt="" style="width:800px;" /></p>
</div>
<footer>Moreno La Quatra | Kore University of Enna</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="31" data-paginate="true" data-header="Machine Learning - Version Control" data-footer="Moreno La Quatra | Kore University of Enna" data-theme="unikore-courses" lang="C" data-marpit-pagination="31" style="--paginate:true;--header:Machine Learning - Version Control;--footer:Moreno La Quatra | Kore University of Enna;--theme:unikore-courses;" data-marpit-pagination-total="57">
<header>Machine Learning - Version Control</header>
<h2 id="pull-requests-prs">Pull Requests (PRs)</h2>
<div class="definition">
<p>A <strong>Pull Request</strong> (PR) is GitHub's mechanism for proposing changes. Instead of directly pushing to the <code>main</code> branch, you push your changes to a feature branch and then open a PR. This creates a dedicated space where:</p>
<ul>
<li>Your teammates can <strong>review your code</strong> line by line</li>
<li>People can leave <strong>comments and suggestions</strong></li>
<li>Automated tests can <strong>run against your changes</strong></li>
<li>The merge only happens once everyone <strong>approves</strong></li>
</ul>
<p>This workflow is called &quot;code review,&quot; and it is standard practice in both industry and research. Even if you are working alone, using PRs helps you organize your work and maintain a clean history.</p>
</div>
<footer>Moreno La Quatra | Kore University of Enna</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="32" data-paginate="true" data-header="Machine Learning - Version Control" data-footer="Moreno La Quatra | Kore University of Enna" data-theme="unikore-courses" lang="C" data-marpit-pagination="32" style="--paginate:true;--header:Machine Learning - Version Control;--footer:Moreno La Quatra | Kore University of Enna;--theme:unikore-courses;" data-marpit-pagination-total="57">
<header>Machine Learning - Version Control</header>
<div class="image-container">
<p><img src="images/github-pull-requests.png" alt="" style="width:1000px;" /></p>
</div>
<footer>Moreno La Quatra | Kore University of Enna</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="33" data-paginate="true" data-header="Machine Learning - Version Control" data-footer="Moreno La Quatra | Kore University of Enna" data-theme="unikore-courses" lang="C" data-marpit-pagination="33" style="--paginate:true;--header:Machine Learning - Version Control;--footer:Moreno La Quatra | Kore University of Enna;--theme:unikore-courses;" data-marpit-pagination-total="57">
<header>Machine Learning - Version Control</header>
<h2 id="finally-sometimes-you-need-to-ignore">Finally, sometimes you need to <code>ignore</code></h2>
<div class="definition">
<p>Sometimes you have files that you don't want Git to track, even if they are in your repository. This is where <code>.gitignore</code> comes in.</p>
<ul>
<li>Specific folders containing temporary files</li>
<li>Log files</li>
<li>Cache files</li>
<li>...</li>
</ul>
<p>To use <code>.gitignore</code>, create a file named <code>.gitignore</code> in the root of your repository and list the files or patterns you want to ignore.</p>
</div>
<footer>Moreno La Quatra | Kore University of Enna</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="34" data-paginate="true" data-header="Machine Learning - Version Control" data-footer="Moreno La Quatra | Kore University of Enna" data-theme="unikore-courses" lang="C" data-marpit-pagination="34" style="--paginate:true;--header:Machine Learning - Version Control;--footer:Moreno La Quatra | Kore University of Enna;--theme:unikore-courses;" data-marpit-pagination-total="57">
<header>Machine Learning - Version Control</header>
<h2 id="gitignore-file"><code>.gitignore</code> file</h2>
<div class="example">
<pre is="marp-pre" data-auto-scaling="downscale-only"><code># .gitignore

# Temporary files
*.pyc
*.pyd

# Log files
*.log

# Cache files
*.pyc
*.pyd

# Specific folders
# ignore the entire content of large_data/ dir
large_data/* 
</code></pre>
</div>
<footer>Moreno La Quatra | Kore University of Enna</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="35" data-paginate="true" data-header="Machine Learning - Version Control" data-footer="Moreno La Quatra | Kore University of Enna" data-theme="unikore-courses" lang="C" data-marpit-pagination="35" style="--paginate:true;--header:Machine Learning - Version Control;--footer:Moreno La Quatra | Kore University of Enna;--theme:unikore-courses;" data-marpit-pagination-total="57">
<header>Machine Learning - Version Control</header>
<h2 id="the-full-git--github-workflow">The Full Git + GitHub Workflow</h2>
<div class="definition">
<p>Let's put it all together. Here is the typical workflow you will follow in this course and in real-world ML projects:</p>
<ol>
<li><strong>Clone</strong> the repository from GitHub (or <code>git init</code> if starting fresh)</li>
<li><strong>Create a branch</strong> for the feature or experiment you are working on</li>
<li><strong>Write code</strong>, making commits along the way with clear messages</li>
<li><strong>Push</strong> your branch to GitHub</li>
<li><strong>Open a Pull Request</strong> on GitHub for review</li>
<li>After approval, <strong>merge</strong> the PR into <code>main</code></li>
<li><strong>Pull</strong> the updated <code>main</code> branch to your local machine</li>
<li><strong>Delete</strong> the feature branch (both locally and on GitHub)</li>
</ol>
<p>This cycle repeats for every new feature or experiment.</p>
</div>
<footer>Moreno La Quatra | Kore University of Enna</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="36" data-paginate="true" data-header="Machine Learning - Version Control" data-footer="Moreno La Quatra | Kore University of Enna" data-theme="unikore-courses" lang="C" data-marpit-pagination="36" style="--paginate:true;--header:Machine Learning - Version Control;--footer:Moreno La Quatra | Kore University of Enna;--theme:unikore-courses;" data-marpit-pagination-total="57">
<header>Machine Learning - Version Control</header>
<h2 id="version-control-challenges-specific-to-ml">Version Control Challenges Specific to ML</h2>
<div class="important">
<p>ML projects are not just code - they also involve <strong>data</strong>, <strong>trained models</strong>, <strong>hyperparameters</strong>, and <strong>experimental results</strong>. This creates unique challenges:</p>
<ul>
<li><strong>Large datasets</strong>: CSV files, image folders, and audio datasets can be gigabytes in size. Git was not designed for large binary files.</li>
<li><strong>Model checkpoints</strong>: Trained models (<code>.pt</code>, <code>.h5</code>, <code>.pkl</code> files) are large and change frequently during experimentation.</li>
<li><strong>Hyperparameter tracking</strong>: Which learning rate, batch size, and architecture produced which results? Without a system, this quickly becomes chaotic.</li>
<li><strong>Environment reproducibility</strong>: Your model might work on your laptop but fail on a colleague's machine because of different library versions.</li>
</ul>
</div>
<footer>Moreno La Quatra | Kore University of Enna</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="37" data-paginate="true" data-header="Machine Learning - Version Control" data-footer="Moreno La Quatra | Kore University of Enna" data-theme="unikore-courses" lang="C" data-marpit-pagination="37" style="--paginate:true;--header:Machine Learning - Version Control;--footer:Moreno La Quatra | Kore University of Enna;--theme:unikore-courses;" data-marpit-pagination-total="57">
<header>Machine Learning - Version Control</header>
<h2 id="conda">Conda</h2>
<div class="definition">
<p>If you have ever run someone else's Python code and gotten an error like <code>ModuleNotFoundError</code> or seen different results because of a different library version, you understand why <strong>environment management</strong> matters.</p>
<p><strong>Conda</strong> is an open-source package and environment management system. It lets you create isolated &quot;bubbles&quot; (called environments) where you can install specific versions of Python and any libraries you need, without affecting your system Python or other projects.</p>
<div class="image-container">
<p><img src="images/conda_logo.png" alt="" style="width:300px;" /></p>
</div>
</div>
<footer>Moreno La Quatra | Kore University of Enna</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="38" data-paginate="true" data-header="Machine Learning - Version Control" data-footer="Moreno La Quatra | Kore University of Enna" data-theme="unikore-courses" lang="C" data-marpit-pagination="38" style="--paginate:true;--header:Machine Learning - Version Control;--footer:Moreno La Quatra | Kore University of Enna;--theme:unikore-courses;" data-marpit-pagination-total="57">
<header>Machine Learning - Version Control</header>
<h2 id="why-conda-instead-of-pip-alone">Why Conda Instead of pip Alone?</h2>
<div class="grid-2">
<div class="definition">
<h3 id="pip--venv">pip + venv</h3>
<ul>
<li>Python-only packages</li>
<li>Handles Python dependencies</li>
<li>Lightweight and built-in</li>
<li>Can struggle with non-Python dependencies (e.g., CUDA, MKL)</li>
<li>Uses <code>requirements.txt</code></li>
</ul>
</div>
<div class="definition">
<h3 id="conda-1">Conda</h3>
<ul>
<li>Manages Python <strong>and</strong> non-Python packages (C libraries, CUDA, etc.)</li>
<li>Better dependency resolution</li>
<li>Cross-platform (Windows, macOS, Linux)</li>
<li>Handles complex ML stacks (GPU drivers, cuDNN)</li>
<li>Uses <code>environment.yml</code></li>
</ul>
</div>
</div>
<footer>Moreno La Quatra | Kore University of Enna</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="39" data-paginate="true" data-header="Machine Learning - Version Control" data-footer="Moreno La Quatra | Kore University of Enna" data-theme="unikore-courses" lang="C" data-marpit-pagination="39" style="--paginate:true;--header:Machine Learning - Version Control;--footer:Moreno La Quatra | Kore University of Enna;--theme:unikore-courses;" data-marpit-pagination-total="57">
<header>Machine Learning - Version Control</header>
<h2 id="installing-conda">Installing Conda</h2>
<div class="example">
<p>We recommend installing <strong>Miniconda</strong>, which is a minimal version of Conda that includes only Conda itself and Python. You can then install only the packages you need.</p>
<p>Download Miniconda from <a href="https://docs.conda.io/en/latest/miniconda.html">docs.conda.io/en/latest/miniconda.html</a> and follow the installation instructions for your operating system.</p>
<p>After installation, verify it works:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash">conda --version
</code></pre>
<p>Alternatively, <strong>Anaconda</strong> includes Conda plus a large collection of pre-installed scientific packages. It is larger but convenient if you want everything out of the box.</p>
</div>
<footer>Moreno La Quatra | Kore University of Enna</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="40" data-paginate="true" data-header="Machine Learning - Version Control" data-footer="Moreno La Quatra | Kore University of Enna" data-theme="unikore-courses" lang="C" data-marpit-pagination="40" style="--paginate:true;--header:Machine Learning - Version Control;--footer:Moreno La Quatra | Kore University of Enna;--theme:unikore-courses;" data-marpit-pagination-total="57">
<header>Machine Learning - Version Control</header>
<h2 id="conda-commands">Conda Commands</h2>
<div class="example">
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash"><span class="hljs-comment"># Create a new environment named &quot;ml-project&quot; with Python 3.11</span>
conda create --name ml-project python=3.11

<span class="hljs-comment"># Activate the environment (your terminal prompt will change to show the env name)</span>
conda activate ml-project

<span class="hljs-comment"># Install packages inside the active environment</span>
conda install scikit-learn pandas matplotlib

<span class="hljs-comment"># Install a package from the conda-forge channel (a community repository)</span>
conda install -c conda-forge seaborn

<span class="hljs-comment"># List all packages installed in the current environment</span>
conda list

<span class="hljs-comment"># Deactivate the environment (go back to the base environment)</span>
conda deactivate

<span class="hljs-comment"># List all environments on your machine</span>
conda <span class="hljs-built_in">env</span> list
</code></pre>
</div>
<footer>Moreno La Quatra | Kore University of Enna</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="41" data-paginate="true" data-header="Machine Learning - Version Control" data-footer="Moreno La Quatra | Kore University of Enna" data-theme="unikore-courses" lang="C" data-marpit-pagination="41" style="--paginate:true;--header:Machine Learning - Version Control;--footer:Moreno La Quatra | Kore University of Enna;--theme:unikore-courses;" data-marpit-pagination-total="57">
<header>Machine Learning - Version Control</header>
<h2 id="exporting-and-sharing-environments">Exporting and Sharing Environments</h2>
<div class="definition">
<p>One of Conda's most important features for reproducibility is the ability to <strong>export</strong> an environment to a YAML file. This file lists every package and its exact version, so anyone can recreate the identical environment on their machine.</p>
<p>This <code>environment.yml</code> file should be committed to your Git repository. When a collaborator clones your project, they simply run one command to set up the exact same environment.</p>
</div>
<div class="example">
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash"><span class="hljs-comment"># Export the current environment to a file</span>
conda <span class="hljs-built_in">env</span> <span class="hljs-built_in">export</span> &gt; environment.yml

<span class="hljs-comment"># Recreate the environment from a file (on another machine or after a fresh install)</span>
conda <span class="hljs-built_in">env</span> create -f environment.yml
</code></pre>
</div>
<footer>Moreno La Quatra | Kore University of Enna</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="42" data-paginate="true" data-header="Machine Learning - Version Control" data-footer="Moreno La Quatra | Kore University of Enna" data-theme="unikore-courses" lang="C" data-marpit-pagination="42" style="--paginate:true;--header:Machine Learning - Version Control;--footer:Moreno La Quatra | Kore University of Enna;--theme:unikore-courses;" data-marpit-pagination-total="57">
<header>Machine Learning - Version Control</header>
<h2 id="environmentyml-a-closer-look">Environment.yml: A Closer Look</h2>
<div class="example">
<p>Here is what a typical <code>environment.yml</code> file looks like:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-yaml"><span class="hljs-attr">name:</span> <span class="hljs-string">ml-project</span>
<span class="hljs-attr">channels:</span>
  <span class="hljs-bullet">-</span> <span class="hljs-string">defaults</span>
  <span class="hljs-bullet">-</span> <span class="hljs-string">conda-forge</span>
<span class="hljs-attr">dependencies:</span>
  <span class="hljs-bullet">-</span> <span class="hljs-string">python=3.11</span>
  <span class="hljs-bullet">-</span> <span class="hljs-string">numpy=1.21.5</span>
  <span class="hljs-bullet">-</span> <span class="hljs-string">pandas=1.4.2</span>
  <span class="hljs-bullet">-</span> <span class="hljs-string">scikit-learn=1.0.2</span>
  <span class="hljs-bullet">-</span> <span class="hljs-string">matplotlib=3.5.1</span>
  <span class="hljs-bullet">-</span> <span class="hljs-attr">pip:</span>
    <span class="hljs-bullet">-</span> <span class="hljs-string">comet-ml==3.31.12</span>
</code></pre>
<p>Notice the structure: <code>name</code> defines the environment name, <code>channels</code> lists where Conda looks for packages, and <code>dependencies</code> lists every package with its version. The <code>pip</code> section at the bottom is for packages that are only available via pip (like <code>comet-ml</code>).</p>
</div>
<footer>Moreno La Quatra | Kore University of Enna</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="43" data-paginate="true" data-header="Machine Learning - Version Control" data-footer="Moreno La Quatra | Kore University of Enna" data-theme="unikore-courses" lang="C" data-marpit-pagination="43" style="--paginate:true;--header:Machine Learning - Version Control;--footer:Moreno La Quatra | Kore University of Enna;--theme:unikore-courses;" data-marpit-pagination-total="57">
<header>Machine Learning - Version Control</header>
<h2 id="experiment-tracking-with-cometml">Experiment Tracking with Comet.ml</h2>
<div class="definition">
<p>One of the biggest challenges in ML: <strong>keeping track of experiments</strong>.</p>
<p>In a typical ML project, you might train dozens or even hundreds of model variants with different hyperparameters, architectures, datasets, and preprocessing steps.</p>
<p><strong>Comet.ml</strong> is a platform that solves this problem by automatically logging everything about your experiments: hyperparameters, metrics, code, environment information, and even visualizations. You can then compare experiments side-by-side in a web dashboard.</p>
</div>
<div class="image-container">
<p><img src="images/comet-logo.png" alt="" style="width:300px;" /></p>
</div>
<footer>Moreno La Quatra | Kore University of Enna</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="44" data-paginate="true" data-header="Machine Learning - Version Control" data-footer="Moreno La Quatra | Kore University of Enna" data-theme="unikore-courses" lang="C" data-marpit-pagination="44" style="--paginate:true;--header:Machine Learning - Version Control;--footer:Moreno La Quatra | Kore University of Enna;--theme:unikore-courses;" data-marpit-pagination-total="57">
<header>Machine Learning - Version Control</header>
<h2 id="comet-is-not-the-only-one">Comet is not the only one</h2>
<div class="definition">
<p>Comet is not the only experiment tracking solution available:</p>
<ul>
<li><a href="https://wandb.ai/">Weights &amp; Biases</a></li>
<li><a href="https://mlflow.org/">MLflow</a></li>
<li><a href="https://www.tensorflow.org/tensorboard">TensorBoard</a></li>
<li>...</li>
</ul>
<p>You can use whichever fits your preference, the goal is not <strong>selecting a tool over another</strong>, the goal is to have a consistent approach to experiment tracking.</p>
<footer>Moreno La Quatra | Kore University of Enna</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="45" data-paginate="true" data-header="Machine Learning - Version Control" data-footer="Moreno La Quatra | Kore University of Enna" data-theme="unikore-courses" lang="C" data-marpit-pagination="45" style="--paginate:true;--header:Machine Learning - Version Control;--footer:Moreno La Quatra | Kore University of Enna;--theme:unikore-courses;" data-marpit-pagination-total="57">
<header>Machine Learning - Version Control</header>
<h2 id="why-not-just-use-spreadsheets-or-notebooks">Why Not Just Use Spreadsheets or Notebooks?</h2>
<div class="important">
<p>You might think: &quot;I will just write down my results in a spreadsheet or a notebook.&quot; Here is why that breaks down:</p>
<ul>
<li><strong>Human error</strong>: It is easy to forget to log a parameter or copy a number wrong</li>
<li><strong>Incomplete records</strong>: You rarely remember to log <em>everything</em> - the random seed, the exact data split, the library version</li>
<li><strong>No code linkage</strong>: A spreadsheet does not tell you which <em>exact code</em> produced a result</li>
<li><strong>Poor scalability</strong>: After 50 experiments, a spreadsheet becomes unmanageable</li>
<li><strong>No visualization</strong>: Comparing learning curves or metric distributions requires manual plotting</li>
</ul>
<p>Comet.ml automates all of this, so you can focus on the science rather than bookkeeping.</p>
</div>
<footer>Moreno La Quatra | Kore University of Enna</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="46" data-paginate="true" data-header="Machine Learning - Version Control" data-footer="Moreno La Quatra | Kore University of Enna" data-theme="unikore-courses" lang="C" data-marpit-pagination="46" style="--paginate:true;--header:Machine Learning - Version Control;--footer:Moreno La Quatra | Kore University of Enna;--theme:unikore-courses;" data-marpit-pagination-total="57">
<header>Machine Learning - Version Control</header>
<h2 id="key-features-of-cometml">Key Features of Comet.ml</h2>
<div class="definition">
<p>Comet.ml provides several tools that work together to make experiment tracking effortless:</p>
<ul>
<li><strong>Experiment Tracking</strong>: Automatically logs hyperparameters, metrics, code, system info, and output for every run</li>
<li><strong>Visualization</strong>: Compare experiments with interactive charts - learning curves, parameter importance, confusion matrices, and more</li>
<li><strong>Model Registry</strong>: Keep track of model versions and promote the best ones to production</li>
<li><strong>Collaboration</strong>: Share experiment results with teammates through a web dashboard</li>
<li><strong>Integration</strong>: Works with all major ML frameworks including scikit-learn, PyTorch, TensorFlow, and Hugging Face</li>
</ul>
</div>
<footer>Moreno La Quatra | Kore University of Enna</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="47" data-paginate="true" data-header="Machine Learning - Version Control" data-footer="Moreno La Quatra | Kore University of Enna" data-theme="unikore-courses" lang="C" data-marpit-pagination="47" style="--paginate:true;--header:Machine Learning - Version Control;--footer:Moreno La Quatra | Kore University of Enna;--theme:unikore-courses;" data-marpit-pagination-total="57">
<header>Machine Learning - Version Control</header>
<h2 id="getting-started-with-cometml">Getting Started with Comet.ml</h2>
<div class="example">
<ol>
<li>Install Comet.ml in your Conda environment:</li>
</ol>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash">pip install comet_ml
</code></pre>
<ol>
<li>
<p>Create a free account at <a href="https://www.comet.ml/">comet.ml</a></p>
</li>
<li>
<p>Get your <strong>API key</strong> from your account settings (Settings -&gt; API Keys). This key identifies your account so that logged experiments appear in your dashboard.</p>
</li>
</ol>
</div>
<footer>Moreno La Quatra | Kore University of Enna</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="48" data-paginate="true" data-header="Machine Learning - Version Control" data-footer="Moreno La Quatra | Kore University of Enna" data-theme="unikore-courses" lang="C" data-marpit-pagination="48" style="--paginate:true;--header:Machine Learning - Version Control;--footer:Moreno La Quatra | Kore University of Enna;--theme:unikore-courses;" data-marpit-pagination-total="57">
<header>Machine Learning - Version Control</header>
<div class="image-container">
<p><img src="images/comet_ml.svg" alt="" style="width:600px;" /></p>
</div>
<footer>Moreno La Quatra | Kore University of Enna</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="49" data-paginate="true" data-header="Machine Learning - Version Control" data-footer="Moreno La Quatra | Kore University of Enna" data-theme="unikore-courses" lang="C" data-marpit-pagination="49" style="--paginate:true;--header:Machine Learning - Version Control;--footer:Moreno La Quatra | Kore University of Enna;--theme:unikore-courses;" data-marpit-pagination-total="57">
<header>Machine Learning - Version Control</header>
<h2 id="git-lfs-for-large-files">Git LFS for Large Files</h2>
<div class="definition">
<p>Git was designed for source code - small text files that change incrementally. When you try to store large binary files (datasets, model checkpoints, images), Git struggles: your repository becomes enormous, cloning takes forever, and performance degrades.</p>
<p><strong>Git Large File Storage (LFS)</strong> solves this by replacing large files with small text <strong>pointers</strong> inside Git, while the actual file content is stored on a separate server. From your perspective, the files look and behave normally - but behind the scenes, Git only tracks the lightweight pointer.</p>
</div>
<footer>Moreno La Quatra | Kore University of Enna</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="50" data-paginate="true" data-header="Machine Learning - Version Control" data-footer="Moreno La Quatra | Kore University of Enna" data-theme="unikore-courses" lang="C" data-marpit-pagination="50" style="--paginate:true;--header:Machine Learning - Version Control;--footer:Moreno La Quatra | Kore University of Enna;--theme:unikore-courses;" data-marpit-pagination-total="57">
<header>Machine Learning - Version Control</header>
<h2 id="git-lfs-for-large-files-1">Git LFS for Large Files</h2>
<div class="example">
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash"><span class="hljs-comment"># Install Git LFS (one-time setup)</span>
git lfs install

<span class="hljs-comment"># Tell Git LFS to track all CSV files</span>
git lfs track <span class="hljs-string">&quot;*.csv&quot;</span>

<span class="hljs-comment"># This creates a .gitattributes file - commit it!</span>
git add .gitattributes
git commit -m <span class="hljs-string">&quot;Configure Git LFS for CSV files&quot;</span>
</code></pre>
<p>Note: GitHub has storage limits for LFS. For very large datasets and models, consider dedicated platforms like <a href="https://huggingface.co/datasets">Hugging Face Datasets</a> or <a href="https://huggingface.co/models">Hugging Face Models</a>.</p>
</div>
<footer>Moreno La Quatra | Kore University of Enna</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="51" data-paginate="true" data-header="Machine Learning - Version Control" data-footer="Moreno La Quatra | Kore University of Enna" data-theme="unikore-courses" lang="C" data-marpit-pagination="51" style="--paginate:true;--header:Machine Learning - Version Control;--footer:Moreno La Quatra | Kore University of Enna;--theme:unikore-courses;" data-marpit-pagination-total="57">
<header>Machine Learning - Version Control</header>
<h2 id="the-complete-workflow-git--conda--cometml">The Complete Workflow: Git + Conda + Comet.ml</h2>
<div class="definition">
<p>Here is how all three tools come together in a typical ML project workflow:</p>
<ol>
<li><strong>Initialize your Git repository</strong> and connect it to GitHub</li>
<li><strong>Create a Conda environment</strong> with your project's dependencies and export it to <code>environment.yml</code></li>
<li><strong>Commit the environment file</strong> to Git so collaborators can reproduce your setup</li>
<li><strong>Write your training code</strong>, using Comet.ml to log experiments</li>
<li><strong>Commit code changes</strong> frequently with clear, descriptive messages</li>
<li><strong>Use branches</strong> for experimental features or architectural changes</li>
<li><strong>Tag important milestones</strong> (e.g., <code>v1.0-baseline</code>, <code>v2.0-transformer-model</code>)</li>
<li><strong>Share results</strong> with collaborators via Comet.ml's dashboard and GitHub PRs</li>
</ol>
<p>This workflow ensures that your work is <strong>reproducible</strong>, <strong>trackable</strong>, and <strong>collaborative</strong> at every stage.</p>
</div>
<footer>Moreno La Quatra | Kore University of Enna</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="52" data-paginate="true" data-header="Machine Learning - Version Control" data-footer="Moreno La Quatra | Kore University of Enna" data-theme="unikore-courses" lang="C" data-marpit-pagination="52" style="--paginate:true;--header:Machine Learning - Version Control;--footer:Moreno La Quatra | Kore University of Enna;--theme:unikore-courses;" data-marpit-pagination-total="57">
<header>Machine Learning - Version Control</header>
<h2 id="structuring-your-ml-project">Structuring Your ML Project</h2>
<div class="important">
<p>A well-organized project makes collaboration and reproducibility much easier.</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>ml-kore-template/
├── config/                       # YAML configuration files for experiments
├── data_classes/                 # Dataset loading and preprocessing classes
│   └── mnist_dataset.py
├── model_classes/                # Model architecture definitions
│   └── ff_model.py
├── extract_representations/      # Scripts for extracting learned representations
├── train.py                      # Main training script
├── test.py                       # Main evaluation script
├── utils.py                      # Shared utility functions
├── prepare.sh                    # Environment setup (installs requirements, downloads data)
├── requirements.txt              # Python dependencies
├── .gitignore                    # Files and folders Git should ignore
├── LICENSE                       # Project license (MIT)
└── README.md                     # Project description and setup instructions
</code></pre>
</div>
<footer>Moreno La Quatra | Kore University of Enna</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="53" data-paginate="true" data-header="Machine Learning - Version Control" data-footer="Moreno La Quatra | Kore University of Enna" data-theme="unikore-courses" lang="C" data-marpit-pagination="53" style="--paginate:true;--header:Machine Learning - Version Control;--footer:Moreno La Quatra | Kore University of Enna;--theme:unikore-courses;" data-marpit-pagination-total="57">
<header>Machine Learning - Version Control</header>
<div class="important">
<p>The key idea is that <strong>anyone</strong> should be able to reproduce your entire project by running:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash">git <span class="hljs-built_in">clone</span> [your-repository-url]
<span class="hljs-built_in">cd</span> [your-repository]
bash prepare.sh
python train.py
python test.py
</code></pre>
<p>Keep dataset logic in <code>data_classes/</code>, model architectures in <code>model_classes/</code>, and entry points (<code>train.py</code>, <code>test.py</code>) at the root. Always include a <code>README.md</code> that explains how to set up and run the project.</p>
</div>
<footer>Moreno La Quatra | Kore University of Enna</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="54" data-paginate="true" data-header="Machine Learning - Version Control" data-footer="Moreno La Quatra | Kore University of Enna" data-theme="unikore-courses" lang="C" data-marpit-pagination="54" style="--paginate:true;--header:Machine Learning - Version Control;--footer:Moreno La Quatra | Kore University of Enna;--theme:unikore-courses;" data-marpit-pagination-total="57">
<header>Machine Learning - Version Control</header>
<h2 id="course-repository">Course Repository</h2>
<p>You can find the template repository to get started with the final project here: <a href="https://github.com/MorenoLaQuatra/ml-kore-template">MorenoLaQuatra/ml-kore-template</a></p>

</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="55" data-paginate="true" data-header="Machine Learning - Version Control" data-footer="Moreno La Quatra | Kore University of Enna" data-theme="unikore-courses" lang="C" data-marpit-pagination="55" style="--paginate:true;--header:Machine Learning - Version Control;--footer:Moreno La Quatra | Kore University of Enna;--theme:unikore-courses;" data-marpit-pagination-total="57">
<header>Machine Learning - Version Control</header>
<h2 id="best-practices">Best Practices</h2>
<div class="important">
<ul>
<li><strong>Commit frequently</strong> with descriptive messages that explain <em>what</em> and <em>why</em></li>
<li><strong>Use branches</strong> for experiments - never experiment directly on <code>main</code></li>
<li><strong>Structure your project</strong> with clear directories (<code>data/</code>, <code>models/</code>, <code>src/</code>)</li>
<li><strong>Document everything</strong> in <code>README.md</code> - setup instructions, how to train, how to evaluate</li>
<li><strong>Version your models</strong> with meaningful Git tags (e.g., <code>v1.0-baseline</code>)</li>
<li><strong>Track experiments</strong> systematically with Comet.ml - do not rely on memory or spreadsheets</li>
<li><strong>Manage dependencies</strong> with Conda and commit <code>environment.yml</code></li>
<li><strong>Separate code from data</strong> - use <code>.gitignore</code> or Git LFS for large files</li>
<li><strong>Pull before you push</strong> to avoid unnecessary conflicts</li>
<li><strong>Review code</strong> through Pull Requests, even for your own work</li>
</ul>
</div>
<footer>Moreno La Quatra | Kore University of Enna</footer>
</section>
