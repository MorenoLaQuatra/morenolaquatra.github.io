<em>worse</em> than training on a smarter, smaller representation.</p>
<p><strong>Dimensionality reduction</strong> finds ways to represent data with <strong>fewer features</strong> while keeping the information that matters.</p>
</div>
<div class="note">
<p><strong>What it gives us in practice:</strong></p>
<ul>
<li><strong>Faster training and inference</strong> - fewer features means less computation</li>
<li><strong>Better generalization</strong> - we remove noise and redundant information</li>
<li><strong>Visualization</strong> - we can plot data that would otherwise be impossible to see</li>
<li><strong>Less overfitting</strong> - simpler inputs lead to simpler models</li>
</ul>
</div>

</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="3" data-paginate="true" data-header="Machine Learning" data-footer="Moreno La Quatra | Kore University of Enna" data-theme="unikore-courses" lang="C" data-marpit-pagination="3" style="--paginate:true;--header:Machine Learning;--footer:Moreno La Quatra | Kore University of Enna;--theme:unikore-courses;" data-marpit-pagination-total="50">
<header>Machine Learning</header>
<h2 id="the-curse-of-dimensionality">The Curse of Dimensionality</h2>
<div class="definition">
<p>The <strong>curse of dimensionality</strong> refers to problems that arise in <strong>high-dimensional spaces</strong>: as features grow, the space volume increases exponentially, and data points become <strong>sparse</strong> and nearly <strong>equidistant</strong> from each other.</p>
</div>
<div class="grid-2">
<div class="note">
<p><strong>What goes wrong:</strong></p>
<ul>
<li><strong>Distances lose meaning</strong> - neighbors and non-neighbors look equally far</li>
<li><strong>Data requirements explode</strong> - you need exponentially more samples to fill the space</li>
<li><strong>Overfitting</strong> - many features, few samples</li>
<li><strong>No visualization</strong> beyond 3D</li>
</ul>
</div>
<div class="note">
<p><strong>Two families of solutions:</strong></p>
<ul>
<li><strong>Unsupervised (PCA)</strong> - asks <em>&quot;where does the data vary the most?&quot;</em> - no labels needed</li>
<li><strong>Supervised (LDA)</strong> - asks <em>&quot;which direction separates classes best?&quot;</em> - uses labels</li>
</ul>
</div>
</div>
<footer>Moreno La Quatra | Kore University of Enna</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="4" data-paginate="true" data-header="Machine Learning" data-footer="Moreno La Quatra | Kore University of Enna" data-theme="unikore-courses" lang="C" data-marpit-pagination="4" style="--paginate:true;--header:Machine Learning;--footer:Moreno La Quatra | Kore University of Enna;--theme:unikore-courses;" data-marpit-pagination-total="50">
<header>Machine Learning</header>
<h1 id="principal-component-analysis-pca">Principal Component Analysis (PCA)</h1>
<footer>Moreno La Quatra | Kore University of Enna</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="5" data-paginate="true" data-header="Machine Learning" data-footer="Moreno La Quatra | Kore University of Enna" data-theme="unikore-courses" lang="C" data-marpit-pagination="5" style="--paginate:true;--header:Machine Learning;--footer:Moreno La Quatra | Kore University of Enna;--theme:unikore-courses;" data-marpit-pagination-total="50">
<header>Machine Learning</header>
<h2 id="what-is-pca">What is PCA?</h2>
<div class="definition">
<p><strong>Principal Component Analysis (PCA)</strong> transforms possibly <strong>correlated</strong> variables into a new set of <strong>linearly uncorrelated</strong> variables called <strong>principal components</strong>, ordered by the amount of <strong>variance</strong> they capture.</p>
</div>
<div class="example">
<p><strong>Intuitive example:</strong> imagine a scatter plot of height vs. weight</p>
<ul>
<li>the points form an <strong>elongated cloud</strong>.</li>
<li>if you had to summarize each person with a <strong>single number</strong>, the smartest choice is to project onto the direction of that elongation.</li>
<li>That direction is the <strong>first principal component</strong>
<ul>
<li>it captures the most spread.</li>
</ul>
</li>
<li>The perpendicular direction is the <strong>second principal component</strong>.</li>
</ul>
<p>Now scale this to 1000 dims: PCA finds the few directions that carry most of the spread and <strong>discards the rest</strong>.</p>
</div>
<footer>Moreno La Quatra | Kore University of Enna</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="6" data-paginate="true" data-header="Machine Learning" data-footer="Moreno La Quatra | Kore University of Enna" data-theme="unikore-courses" lang="C" data-marpit-pagination="6" style="--paginate:true;--header:Machine Learning;--footer:Moreno La Quatra | Kore University of Enna;--theme:unikore-courses;" data-marpit-pagination-total="50">
<header>Machine Learning</header>
<h2 id="how-pca-works">How PCA Works</h2>
<div class="important">
<p>PCA finds the <strong>directions (vectors)</strong> where data varies the most, then <strong>projects</strong> the data onto these directions.</p>
</div>
<div class="grid-2">
<div>
<p><strong>Properties of principal components:</strong></p>
<ul>
<li>The <strong>first</strong> component points in the direction of <strong>maximum variance</strong></li>
<li>Each subsequent component captures the <strong>maximum remaining variance</strong></li>
<li>All components are <strong>orthogonal</strong> (perpendicular) to each other</li>
<li>Importance <strong>decreases</strong> with each component - later ones mostly capture noise</li>
</ul>
</div>
<div class="image-container">
<p><img src="images/first_c.gif" alt="" style="width:500px;" /></p>
<p class="image-caption">Finding the first principal component</p>
</div>
</div>
<footer>Moreno La Quatra | Kore University of Enna</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="7" data-paginate="true" data-header="Machine Learning" data-footer="Moreno La Quatra | Kore University of Enna" data-theme="unikore-courses" lang="C" data-marpit-pagination="7" style="--paginate:true;--header:Machine Learning;--footer:Moreno La Quatra | Kore University of Enna;--theme:unikore-courses;" data-marpit-pagination-total="50">
<header>Machine Learning</header>
<h2 id="why-variance-matters">Why Variance Matters</h2>
<div class="important">
<p><strong>Variance</strong> measures how <strong>spread out</strong> a feature's values are. A feature where all samples have nearly the same value has <strong>low variance</strong> and carries <strong>little information</strong>. A feature where values differ a lot has <strong>high variance</strong> and is potentially <strong>informative</strong>.</p>
<p><strong>PCA's core assumption:</strong> directions of <strong>high variance</strong> = directions of <strong>high information</strong>. By keeping only high-variance directions, we keep the <strong>signal</strong> and discard the <strong>noise</strong>.</p>
</div>
<div class="note">
<p>This assumption works well in many settings, but it is just an <em>assumption</em>. Sometimes the most informative direction is <strong>not</strong> the one with the highest variance - we will see this when we introduce <strong>LDA</strong>.</p>
</div>
<footer>Moreno La Quatra | Kore University of Enna</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="8" data-paginate="true" data-header="Machine Learning" data-footer="Moreno La Quatra | Kore University of Enna" data-theme="unikore-courses" lang="C" data-marpit-pagination="8" style="--paginate:true;--header:Machine Learning;--footer:Moreno La Quatra | Kore University of Enna;--theme:unikore-courses;" data-marpit-pagination-total="50">

<h2 id="choosing-the-number-of-components">Choosing the Number of Components</h2>
<div class="grid-2">
<div>
<p>The <strong>scree plot</strong> shows variance explained per component.</p>
<p><strong>How to use it:</strong></p>
<ul>
<li>Find the <strong>&quot;elbow&quot;</strong>  (curve goes from steep to flat)</li>
<li>Components <strong>before</strong> the elbow → meaningful variance</li>
<li>Components <strong>after</strong> the elbow → mostly noise</li>
</ul>

<header>Machine Learning</header>
<h2 id="applications-of-pca">Applications of PCA</h2>
<div class="grid-2">
<div class="note">
<p><strong>Noise Reduction</strong></p>
<p>Project down to <mjx-container class="MathJax" jax="SVG"><svg style="vertical-align: -0.025ex;" xmlns="http://www.w3.org/2000/svg" width="1.179ex" height="1.595ex" role="img" focusable="false" viewBox="0 -694 521 705"><g stroke="currentColor" fill="currentColor" stroke-width="0" transform="scale(1,-1)"><g data-mml-node="math"><g data-mml-node="mi"><path data-c="1D458" d="M121 647Q121 657 125 670T137 683Q138 683 209 688T282 694Q294 694 294 686Q294 679 244 477Q194 279 194 272Q213 282 223 291Q247 309 292 354T362 415Q402 442 438 442Q468 442 485 423T503 369Q503 344 496 327T477 302T456 291T438 288Q418 288 406 299T394 328Q394 353 410 369T442 390L458 393Q446 405 434 405H430Q398 402 367 380T294 316T228 255Q230 254 243 252T267 246T293 238T320 224T342 206T359 180T365 147Q365 130 360 106T354 66Q354 26 381 26Q429 26 459 145Q461 153 479 153H483Q499 153 499 144Q499 139 496 130Q455 -11 378 -11Q333 -11 305 15T277 90Q277 108 280 121T283 145Q283 167 269 183T234 206T200 217T182 220H180Q168 178 159 139T145 81T136 44T129 20T122 7T111 -2Q98 -11 83 -11Q66 -11 57 -1T48 16Q48 26 85 176T158 471L195 616Q196 629 188 632T149 637H144Q134 637 131 637T124 640T121 647Z"></path></g></g></g></svg></mjx-container> components (discard <strong>low-variance noise directions</strong>), then reconstruct. The result retains the <strong>signal</strong> but filters out the <strong>noise</strong>.</p>
<div class="image-container">
<img src="images/noise_reduction.ppm" width="400" />
</div>
</div>
<div class="note">
<p><strong>Data Visualization</strong></p>
<p>Project high-dimensional data to <strong>2D or 3D</strong> for visual exploration: check for clusters, spot outliers, and get a feel for the data structure.</p>
<div class="image-container">
<img src="images/embeddings.ppm" width="400" />
</div>
</div>
</div>
<footer>Moreno La Quatra | Kore University of Enna</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="24" data-paginate="true" data-header="Machine Learning" data-footer="Moreno La Quatra | Kore University of Enna" data-theme="unikore-courses" lang="C" data-marpit-pagination="24" style="--paginate:true;--header:Machine Learning;--footer:Moreno La Quatra | Kore University of Enna;--theme:unikore-courses;" data-marpit-pagination-total="50">
<header>Machine Learning</header>
<h2 id="advantages-and-limitations-of-pca">Advantages and Limitations of PCA</h2>
<div class="grid-2">
<div class="note">
<p><strong>Advantages</strong></p>
<ul>
<li>Preserves <strong>maximum variance</strong> in fewer dimensions</li>
<li>Removes <strong>correlations</strong> between features (orthogonal components)</li>
<li><strong>Speeds up</strong> downstream algorithms</li>
<li>Enables <strong>visualization</strong> of high-dimensional data</li>
<li>Reduces <strong>overfitting</strong> by simplifying input</li>
<li><strong>Simple</strong>, well-understood, available everywhere</li>
</ul>
</div>
<div class="important">
<p><strong>Limitations</strong></p>
<ul>
<li>Only captures <strong>linear</strong> relationships</li>
<li><strong>Scale-sensitive</strong> - must standardize first</li>
<li>Components lose <strong>interpretability</strong> (they mix all original features)</li>
<li>Maximum variance ≠ maximum <strong>usefulness for classification</strong></li>
<li><strong>Sensitive to outliers</strong> - they distort the covariance matrix</li>
<li>Assumes roughly <strong>Gaussian</strong> data for optimal performance</li>
</ul>
</div>
</div>
<footer>Moreno La Quatra | Kore University of Enna</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="25" data-paginate="true" data-header="Machine Learning" data-footer="Moreno La Quatra | Kore University of Enna" data-theme="unikore-courses" lang="C" data-marpit-pagination="25" style="--paginate:true;--header:Machine Learning;--footer:Moreno La Quatra | Kore University of Enna;--theme:unikore-courses;" data-marpit-pagination-total="50">
<header>Machine Learning</header>
<h2 id="when-pca-falls-short">When PCA Falls Short</h2>
<div class="important">
<p>Imagine two classes in 2D. The direction of <strong>maximum variance</strong> might go right <strong>through both classes</strong>, mixing them together. PCA would choose this direction because it maximizes variance - but it is <strong>terrible for classification</strong>.</p>
<p>What we need is a direction where the classes are as <strong>separated</strong> as possible. PCA cannot give us this because it has <strong>no knowledge of labels</strong>.</p>
<p><strong>Linear Discriminant Analysis (LDA)</strong>: find directions that maximize <strong>class separation</strong>, not overall variance.<br />
However, it is <em>supervised</em> and requires class labels.</p>
</div>
<footer>Moreno La Quatra | Kore University of Enna</footer>
</section>

<header>Machine Learning</header>
<h1 id="linear-discriminant-analysis-lda">Linear Discriminant Analysis (LDA)</h1>
<footer>Moreno La Quatra | Kore University of Enna</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="27" data-paginate="true" data-header="Machine Learning" data-footer="Moreno La Quatra | Kore University of Enna" data-theme="unikore-courses" lang="C" data-marpit-pagination="27" style="--paginate:true;--header:Machine Learning;--footer:Moreno La Quatra | Kore University of Enna;--theme:unikore-courses;" data-marpit-pagination-total="50">
<header>Machine Learning</header>
<h2 id="what-is-lda">What is LDA?</h2>
<div class="definition">
<p><strong>Linear Discriminant Analysis (LDA)</strong> is a <strong>supervised</strong> dimensionality reduction technique. Given data with <strong>class labels</strong>, it finds directions that best <strong>separate</strong> the classes.</p>
<ul>
<li><strong>PCA</strong> asks: <em>&quot;Where does the data vary the most?&quot;</em> (ignores labels)</li>
<li><strong>LDA</strong> asks: <em>&quot;Which direction separates the classes the most?&quot;</em> (uses labels)</li>
</ul>
</div>

<header>Machine Learning</header>
<h2 id="the-core-idea-behind-lda">The Core Idea Behind LDA</h2>
<div class="important">
<p>LDA optimizes for two things <strong>at the same time</strong>:</p>
<ol>
<li><strong>Class means far apart</strong> → large <strong>between-class scatter</strong></li>
<li><strong>Samples within each class tightly clustered</strong> → small <strong>within-class scatter</strong></li>
</ol>
<p>Think of it as finding the <strong>viewing angle</strong> from which the classes look <strong>most distinct</strong>.</p>
</div>

<header>Machine Learning</header>
<h2 id="lda-with-scikit-learn">LDA with Scikit-learn</h2>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">from</span> sklearn.discriminant_analysis <span class="hljs-keyword">import</span> LinearDiscriminantAnalysis
<span class="hljs-keyword">from</span> sklearn.datasets <span class="hljs-keyword">import</span> load_iris
<span class="hljs-keyword">import</span> numpy <span class="hljs-keyword">as</span> np
<span class="hljs-keyword">import</span> matplotlib.pyplot <span class="hljs-keyword">as</span> plt

<span class="hljs-comment"># 150 samples, 4 features, 3 classes</span>
iris = load_iris()
X = iris.data
y = iris.target

<span class="hljs-comment"># Reduce to 2D (max = 3 classes - 1 = 2)</span>
lda = LinearDiscriminantAnalysis(n_components=<span class="hljs-number">2</span>)
X_lda = lda.fit_transform(X, y)  <span class="hljs-comment"># note: both X and y required (supervised!)</span>

<span class="hljs-built_in">print</span>(<span class="hljs-string">&quot;Explained variance ratio:&quot;</span>, lda.explained_variance_ratio_)
</code></pre>
<footer>Moreno La Quatra | Kore University of Enna</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="42" data-paginate="true" data-header="Machine Learning" data-footer="Moreno La Quatra | Kore University of Enna" data-theme="unikore-courses" lang="C" data-marpit-pagination="42" style="--paginate:true;--header:Machine Learning;--footer:Moreno La Quatra | Kore University of Enna;--theme:unikore-courses;" data-marpit-pagination-total="50">
<header>Machine Learning</header>
<h2 id="lda-with-scikit-learn-1">LDA with Scikit-learn</h2>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-comment"># Visualize - each class in a different color</span>
plt.figure(figsize=(<span class="hljs-number">8</span>, <span class="hljs-number">6</span>))
colors = [<span class="hljs-string">&#x27;navy&#x27;</span>, <span class="hljs-string">&#x27;turquoise&#x27;</span>, <span class="hljs-string">&#x27;darkorange&#x27;</span>]
target_names = iris.target_names

<span class="hljs-keyword">for</span> color, i, target_name <span class="hljs-keyword">in</span> <span class="hljs-built_in">zip</span>(colors, [<span class="hljs-number">0</span>, <span class="hljs-number">1</span>, <span class="hljs-number">2</span>], target_names):
    plt.scatter(X_lda[y == i, <span class="hljs-number">0</span>], X_lda[y == i, <span class="hljs-number">1</span>], color=color, alpha=<span class="hljs-number">0.8</span>,
                label=target_name)

plt.legend(loc=<span class="hljs-string">&#x27;best&#x27;</span>)
plt.xlabel(<span class="hljs-string">&#x27;First Discriminant Component&#x27;</span>)
plt.ylabel(<span class="hljs-string">&#x27;Second Discriminant Component&#x27;</span>)
plt.title(<span class="hljs-string">&#x27;LDA of Iris dataset&#x27;</span>)
plt.grid(<span class="hljs-literal">True</span>)
plt.show()
</code></pre>

</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="43" data-paginate="true" data-header="Machine Learning" data-footer="Moreno La Quatra | Kore University of Enna" data-theme="unikore-courses" lang="C" data-marpit-pagination="43" style="--paginate:true;--header:Machine Learning;--footer:Moreno La Quatra | Kore University of Enna;--theme:unikore-courses;" data-marpit-pagination-total="50">
<header>Machine Learning</header>
<h2 id="applications-of-lda">Applications of LDA</h2>
<div class="grid-2">
<div class="note">
<p><strong>Classification Tasks</strong></p>
<p>LDA works both as a <strong>dimensionality reduction</strong> step and directly <strong>as a classifier</strong> (by modeling each class as a Gaussian in the projected space).</p>
<p>Common uses: <strong>face recognition</strong>, <strong>medical diagnosis</strong>, <strong>speech recognition</strong>.</p>
</div>
<div class="note">
<p><strong>Data Preprocessing</strong></p>
<p>Even when using a different classifier (SVM, random forest), projecting through LDA first can <strong>improve performance</strong> by removing irrelevant variance and focusing on <strong>class-discriminating information</strong>.</p>
</div>
</div>
<div class="example">
<p><strong>Eigenfaces vs. Fisherfaces:</strong> PCA captures global properties like <strong>lighting</strong> and <strong>average face shape</strong> (high variance, but not identity-specific). LDA focuses on <strong>person-specific features</strong> (eye spacing, jaw line). Fisherfaces typically <strong>outperforms</strong> Eigenfaces because maximizing variance ≠ maximizing identity discrimination.</p>
</div>
<footer>Moreno La Quatra | Kore University of Enna</footer>
</section>

<h2 id="pca-vs-lda-comparison">PCA vs. LDA: Comparison</h2>
<div class="grid-2">
<div class="note">
<p><strong>PCA</strong></p>
<ul>
<li><strong>Type</strong>: Unsupervised</li>
<li><strong>Objective</strong>: Maximize <strong>variance</strong></li>
<li><strong>Max components</strong>: <mjx-container class="MathJax" jax="SVG"><svg style="vertical-align: -0.566ex;" xmlns="http://www.w3.org/2000/svg" width="9.072ex" height="2.262ex" role="img" focusable="false" viewBox="0 -750 4009.7 1000"><g stroke="currentColor" fill="currentColor" stroke-width="0" transform="scale(1,-1)"><g data-mml-node="math"><g data-mml-node="mo"><path data-c="6D" d="M41 46H55Q94 46 102 60V68Q102 77 102 91T102 122T103 161T103 203Q103 234 103 269T102 328V351Q99 370 88 376T43 385H25V408Q25 431 27 431L37 432Q47 433 65 434T102 436Q119 437 138 438T167 441T178 442H181V402Q181 364 182 364T187 369T199 384T218 402T247 421T285 437Q305 442 336 442Q351 442 364 440T387 434T406 426T421 417T432 406T441 395T448 384T452 374T455 366L457 361L460 365Q463 369 466 373T475 384T488 397T503 410T523 422T546 432T572 439T603 442Q729 442 740 329Q741 322 741 190V104Q741 66 743 59T754 49Q775 46 803 46H819V0H811L788 1Q764 2 737 2T699 3Q596 3 587 0H579V46H595Q656 46 656 62Q657 64 657 200Q656 335 655 343Q649 371 635 385T611 402T585 404Q540 404 506 370Q479 343 472 315T464 232V168V108Q464 78 465 68T468 55T477 49Q498 46 526 46H542V0H534L510 1Q487 2 460 2T422 3Q319 3 310 0H302V46H318Q379 46 379 62Q380 64 380 200Q379 335 378 343Q372 371 358 385T334 402T308 404Q263 404 229 370Q202 343 195 315T187 232V168V108Q187 78 188 68T191 55T200 49Q221 46 249 46H265V0H257L234 1Q210 2 183 2T145 3Q42 3 33 0H25V46H41Z"></path><path data-c="69" d="M69 609Q69 637 87 653T131 669Q154 667 171 652T188 609Q188 579 171 564T129 549Q104 549 87 564T69 609ZM247 0Q232 3 143 3Q132 3 106 3T56 1L34 0H26V46H42Q70 46 91 49Q100 53 102 60T104 102V205V293Q104 345 102 359T88 378Q74 385 41 385H30V408Q30 431 32 431L42 432Q52 433 70 434T106 436Q123 437 142 438T171 441T182 442H185V62Q190 52 197 50T232 46H255V0H247Z" transform="translate(833,0)"></path><path data-c="6E" d="M41 46H55Q94 46 102 60V68Q102 77 102 91T102 122T103 161T103 203Q103 234 103 269T102 328V351Q99 370 88 376T43 385H25V408Q25 431 27 431L37 432Q47 433 65 <li><strong>Best when</strong>: no labels, general-purpose compression, visualization</li>

<div class="note">
<p><strong>LDA</strong></p>
<ul>
